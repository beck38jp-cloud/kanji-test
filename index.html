<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>学習アプリ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="学習アプリ">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      --primary:#6366f1; --primary-dark:#4f46e5;
      --success:#22c55e; --error:#ef4444;
      --bg:#f5f3ff; --card:#fff; --text:#1e293b; --muted:#64748b;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
      display:flex; justify-content:center;
      padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    }
    #app{width:100%;max-width:600px}
    .screen{display:none}
    .screen.active{display:block}
    .version-label{
      position:fixed;right:10px;bottom:8px;z-index:20;
      font-size:.72rem;color:#64748b;background:rgba(255,255,255,.88);
      border:1px solid #e2e8f0;border-radius:999px;padding:4px 8px;
      box-shadow:0 2px 10px rgba(15,23,42,.08);pointer-events:none
    }
    .card{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:12px}
    h1{font-size:1.7rem;font-weight:700;text-align:center;margin-bottom:6px}
    .subtitle{text-align:center;color:var(--muted);margin-bottom:24px;font-size:.9rem}

    /* 学年・教科グリッド */
    .grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
    .subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
    .grade-btn,.subject-btn{
      border:2px solid #e2e8f0;border-radius:14px;background:#fff;
      cursor:pointer;padding:16px 8px;text-align:center;font-family:inherit;
      transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px
    }
    .grade-btn .icon,.subject-btn .icon{font-size:2rem}
    .grade-btn .label,.subject-btn .label{font-size:.95rem;font-weight:700}
    .subject-btn .badge{font-size:.7rem;padding:2px 8px;border-radius:99px;background:#f1f5f9;color:var(--muted)}
    .grade-btn:hover,.subject-btn:not(.disabled):hover{border-color:var(--primary);background:#f5f3ff;transform:translateY(-2px)}
    .grade-btn.g4:hover,.grade-btn.g4.selected{border-color:#f59e0b;background:#fffbeb}
    .grade-btn.g5:hover,.grade-btn.g5.selected{border-color:#10b981;background:#f0fdf4}
    .grade-btn.g6:hover,.grade-btn.g6.selected{border-color:#6366f1;background:#f5f3ff}
    .subject-btn.disabled{opacity:.5;cursor:not-allowed}
    .subject-btn.disabled .badge{background:#fee2e2;color:#ef4444}

    /* スタート画面 */
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:.9rem;
      border:none;background:none;cursor:pointer;margin-bottom:16px;font-family:inherit;padding:4px 0}
    .back-btn:hover{color:var(--primary)}
    .screen-title{font-size:1.2rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .mode-btn{
      padding:16px;border:2px solid #e2e8f0;border-radius:12px;
      background:#fff;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s
    }
    .mode-btn .icon{font-size:1.5rem;display:block;margin-bottom:4px}
    .mode-btn .label{font-size:.95rem;font-weight:700;display:block}
    .mode-btn .desc{font-size:.75rem;color:var(--muted);display:block;margin-top:2px}
    .mode-btn:hover{border-color:var(--primary)}
    .mode-btn.selected{border-color:var(--primary);background:#f5f3ff}
    .count-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .count-btn{
      padding:8px 14px;border:2px solid #e2e8f0;border-radius:8px;
      background:#fff;cursor:pointer;font-weight:600;font-family:inherit;transition:all .15s
    }
    .count-btn.selected{border-color:var(--primary);background:#f5f3ff;color:var(--primary)}
    .section-label{font-size:.85rem;font-weight:700;color:var(--muted);margin-bottom:8px}
    .cat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .cat-btn{
      padding:7px 14px;border:2px solid #e2e8f0;border-radius:8px;
      background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:all .15s
    }
    .cat-btn.selected{border-color:var(--primary);background:#f5f3ff;color:var(--primary)}
    .start-btn{
      width:100%;padding:16px;font-size:1.1rem;
      background:var(--primary);color:#fff;border:none;border-radius:12px;
      cursor:pointer;font-weight:700;font-family:inherit;transition:all .15s
    }
    .start-btn:hover{background:var(--primary-dark);transform:translateY(-1px)}

    /* クイズ画面 */
    .quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:.85rem;color:var(--muted)}
    .progress-bar{height:8px;background:#e2e8f0;border-radius:4px;margin-bottom:20px;overflow:hidden}
    .progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s}
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:600}
    .badge-reading{background:#dbeafe;color:#1d4ed8}
    .badge-writing{background:#dcfce7;color:#166534}
    .badge-math{background:#fef3c7;color:#92400e}
    .badge-sci{background:#f0fdf4;color:#15803d}
    .badge-soc{background:#fdf4ff;color:#7e22ce}
    .badge-eng{background:#fce7f3;color:#9d174d}
    .badge-jpn{background:#f1f5f9;color:#334155}
    .q-hint{text-align:center;color:var(--muted);margin-bottom:10px;font-size:.85rem}
    .q-figure{display:flex;justify-content:center;margin:4px 0 8px}.q-figure svg{max-width:260px;height:auto}
    .q-text{font-size:1.8rem;text-align:center;margin:16px 0;line-height:1.6}
    .q-sub{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:14px;color:#475569}
    .hl{color:var(--primary);font-weight:700;border-bottom:3px solid var(--primary)}
    .answer-input{
      width:100%;padding:14px;font-size:16px;
      border:2px solid #e2e8f0;border-radius:10px;text-align:center;
      outline:none;transition:border-color .2s;font-family:inherit;margin-bottom:10px
    }
    .answer-input:focus{border-color:var(--primary)}
    .answer-input.correct{border-color:var(--success);background:#f0fdf4}
    .answer-input.incorrect{border-color:var(--error);background:#fef2f2}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .choice-btn{
      padding:16px 8px;font-size:1.1rem;
      border:2px solid #e2e8f0;border-radius:10px;background:#fff;
      cursor:pointer;font-family:inherit;transition:all .15s;line-height:1.4
    }
    .choice-btn:hover:not(:disabled){border-color:var(--primary);background:#f5f3ff;transform:translateY(-1px)}
    .choice-btn.correct{border-color:var(--success)!important;background:#f0fdf4!important}
    .choice-btn.incorrect{border-color:var(--error)!important;background:#fef2f2!important}
    .choice-btn:disabled{cursor:default;transform:none}
    .feedback{text-align:center;font-size:1rem;font-weight:600;margin:12px 0;min-height:24px}
    .feedback.correct{color:var(--success)}
    .feedback.incorrect{color:var(--error)}
    .explanation{background:#f8fafc;border-left:3px solid #94a3b8;border-radius:6px;padding:10px 14px;margin:8px 0 4px;font-size:.88rem;color:#334155;text-align:left;line-height:1.6;display:none}
    .next-btn{
      width:100%;padding:14px;font-size:1rem;background:#475569;color:#fff;
      border:none;border-radius:10px;cursor:pointer;font-weight:600;font-family:inherit;display:none;margin-top:4px
    }
    .next-btn:hover{background:#334155}
    .quit-btn{
      display:block;margin:12px auto 0;padding:8px 20px;
      background:none;border:1.5px solid #cbd5e1;border-radius:8px;
      color:var(--muted);font-size:.85rem;font-family:inherit;cursor:pointer;
    }
    .quit-btn:hover{background:#f8fafc;color:var(--error);border-color:var(--error)}
    .confirm-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.4);
      display:flex;align-items:center;justify-content:center;z-index:100
    }
    .confirm-box{
      background:#fff;border-radius:16px;padding:28px 24px;width:min(320px,90vw);text-align:center
    }
    .confirm-box p{font-size:1rem;margin-bottom:20px;line-height:1.6}
    .confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .confirm-ok{padding:12px;background:var(--error);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit}
    .confirm-cancel{padding:12px;background:#f1f5f9;color:var(--text);border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit}
    .check-btn{
      width:100%;padding:14px;font-size:1rem;background:var(--primary);color:#fff;
      border:none;border-radius:10px;cursor:pointer;font-weight:600;font-family:inherit
    }
    .check-btn:hover{background:var(--primary-dark)}

    /* 結果画面 */
    .score-big{font-size:3.5rem;font-weight:700;text-align:center;color:var(--primary);margin:16px 0 4px}
    .score-pct{text-align:center;color:var(--muted);margin-bottom:4px}
    .score-msg{text-align:center;font-weight:600;font-size:1.05rem;margin-bottom:24px}
    .wrong-title{font-size:.95rem;font-weight:700;border-bottom:2px solid #f1f5f9;padding-bottom:8px;margin-bottom:8px}
    .wrong-list{max-height:300px;overflow-y:auto}
    .wrong-item{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 4px;border-bottom:1px solid #f8fafc;gap:8px}
    .wrong-item .w-q{font-size:1rem;font-weight:700;min-width:80px}
    .wrong-item .w-hint{font-size:.75rem;color:var(--muted);margin-top:2px}
    .wrong-item .w-ans{text-align:right;font-size:.85rem;color:#059669}
    .wrong-item .w-mine{color:var(--error);font-size:.8rem}
    .all-correct{text-align:center;color:var(--success);padding:20px;font-size:1.05rem;font-weight:600}
    .result-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
    .btn-retry{padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit;font-size:.95rem}
    .btn-home{padding:14px;background:#f1f5f9;color:var(--text);border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:inherit;font-size:.95rem}
  </style>
</head>
<body>
<div id="app">
<div class="version-label">最新版 v7</div>

<!-- ① 学年選択 -->
<div id="grade-screen" class="screen active">
  <div class="card">
    <h1>📚 学習アプリ</h1>
    <p class="subtitle">学年を選んでください</p>
    <div class="grade-grid">
      <button class="grade-btn g4" onclick="selectGrade(4)">
        <span class="icon">🌱</span>
        <span class="label">4年生</span>
      </button>
      <button class="grade-btn g5" onclick="selectGrade(5)">
        <span class="icon">🌿</span>
        <span class="label">5年生</span>
      </button>
      <button class="grade-btn g6" onclick="selectGrade(6)">
        <span class="icon">🌳</span>
        <span class="label">6年生</span>
      </button>
    </div>
  </div>
</div>

<!-- ② 教科選択 -->
<div id="subject-screen" class="screen">
  <div class="card">
    <button class="back-btn" onclick="showScreen('grade-screen')">◀ 学年選択に戻る</button>
    <div class="screen-title" id="subject-title">4年生 — 教科を選ぶ</div>
    <div class="subject-grid" id="subject-grid"></div>
  </div>
</div>

<!-- ③ スタート -->
<div id="start-screen" class="screen">
  <div class="card">
    <button class="back-btn" onclick="showScreen('subject-screen')">◀ 教科選択に戻る</button>
    <div class="screen-title" id="start-title"></div>
    <div id="start-options"></div>
    <button class="start-btn" onclick="startTest()">テスト開始 →</button>
  </div>
</div>

<!-- ④ クイズ -->
<div id="quiz-screen" class="screen">
  <div class="card">
    <div class="quiz-meta">
      <span id="q-counter">1 / 20</span>
      <span id="q-score">正解: 0</span>
      <span id="q-badge"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="question-area"></div>
    <div class="feedback" id="feedback"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
    <button class="quit-btn" onclick="confirmQuit()">やめる</button>
  </div>
</div>

<!-- 確認ダイアログ -->
<div class="confirm-overlay" id="quit-overlay" style="display:none">
  <div class="confirm-box">
    <p>テストを中断して<br>ホームに戻りますか？<br><small style="color:#94a3b8">（結果は保存されません）</small></p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeQuit()">続ける</button>
      <button class="confirm-ok" onclick="doQuit()">やめる</button>
    </div>
  </div>
</div>

<!-- ⑤ 結果 -->
<div id="results-screen" class="screen">
  <div class="card">
    <h1>テスト結果</h1>
    <div class="score-big" id="res-score"></div>
    <div class="score-pct" id="res-pct"></div>
    <div class="score-msg" id="res-msg"></div>
    <div class="wrong-title">間違えた問題</div>
    <div class="wrong-list" id="wrong-list"></div>
    <div class="result-btns">
      <button class="btn-retry" onclick="startTest()">もう一度</button>
      <button class="btn-home" onclick="showScreen('grade-screen')">ホームへ</button>
    </div>
  </div>
</div>

</div><!-- #app -->

    {q:"腕を曲げるとき縮む筋肉はどこか",a:"上腕二頭筋（力こぶ）",w:["上腕三頭筋","三角筋","背筋"],cat:"体のつくりと運動",e:"腕を曲げると力こぶ（上腕二頭筋）が縮みます。伸ばすときは反対側の上腕三頭筋が縮みます。"},
    {q:"筋肉が縮むと骨はどうなるか",a:"引っ張られて動く",w:["骨が伸びる","骨が太くなる","動かない"],cat:"体のつくりと運動",e:"筋肉は縮む力しかないため、2つの筋肉が交互に縮んで骨を引っ張り、曲げ伸ばしをします。"},
    {q:"かん電池・豆電球・スイッチをつないで電気が流れる道を何というか",a:"回路",w:["電流","電圧","電力"],cat:"電気のはたらき",e:"電気が流れる一つながりの道を回路といいます。どこか1か所でも切れると電流は流れません。"},
    {q:"電池2個を直列につなぐと豆電球は",a:"明るくなる",w:["暗くなる","変わらない","点滅する"],cat:"電気のはたらき",e:"直列つなぎは電圧が2倍になるため電球が明るくなりますが、電池の消耗も早くなります。"},
    {q:"電流の大きさをはかる道具は",a:"電流計",w:["温度計","方位磁針","体積計"],cat:"電気のはたらき",e:"電流の大きさの単位はアンペア（A）で、電流計で測ります。回路に直列につなぎます。"},
    {q:"空気を押し縮めると体積は",a:"小さくなる",w:["大きくなる","変わらない","なくなる"],cat:"空気と水",e:"空気は気体なので力を加えると圧縮できます。一方、水は液体なので圧縮できません。"},
    {q:"水を力強く押したとき体積は",a:"ほとんど変わらない",w:["小さくなる","大きくなる","なくなる"],cat:"空気と水",e:"液体の水は気体の空気と違い、力を加えてもほとんど体積が変化しません。"},
    {q:"注射器に空気を閉じ込めて押すとどうなるか",a:"体積が小さくなり手ごたえがある",w:["体積が変わらず手ごたえもない","空気が消える","体積が大きくなる"],cat:"空気と水",e:"空気は弾力があり、押すと体積は小さくなりますが完全には縮みません。そのため手ごたえがあります。"},
    {q:"夏の大三角を構成する星でないのは",a:"シリウス",w:["ベガ","デネブ","アルタイル"],cat:"星と月",e:"夏の大三角はベガ（こと座）・デネブ（はくちょう座）・アルタイル（わし座）の3つです。シリウスは冬の星。"},
    {q:"月が満月から次の満月になるまでの日数は約",a:"30日",w:["7日","14日","365日"],cat:"星と月",e:"月は約29.5日で地球を1周（公転）するため、満月から次の満月まで約1か月かかります。"},
    {q:"星の明るさの等級で数字が小さいほど",a:"明るい",w:["暗い","色が赤い","大きい"],cat:"星と月",e:"1等星・2等星と数が小さいほど明るく、6等星が肉眼で見える限界です。マイナスの等級の星もあります。"},
    {q:"金属を温めると体積は",a:"大きくなる",w:["小さくなる","変わらない","なくなる"],cat:"ものの体積",e:"金属は温めると膨張して体積が大きくなります（熱膨張）。橋の継ぎ目などにこの性質が活用されます。"},
    {q:"温めたとき体積の変化が最も大きいのは",a:"気体",w:["液体","固体","どれも同じ"],cat:"ものの体積",e:"温めたときの体積変化は気体＞液体＞固体の順に大きいです。気体は特に大きく変化します。"},
    {q:"春・秋の天気の変化として正しいのは",a:"西から東へ変わりやすい",w:["東から西へ変わる","南から北へ変わる","変わりにくい"],cat:"天気と気温",e:"日本付近では偏西風の影響で、天気は西から東へと移り変わります。"},
    {q:"気温を測るときの正しい方法は",a:"日かげで地面から1.2〜1.5mの高さで測る",w:["日なたで測る","地面の近くで測る","建物の真横で測る"],cat:"天気と気温",e:"直射日光や地面の熱の影響を避けるため、日かげで地面から1.2〜1.5mの高さで測ります。"},
    {q:"雨が降るとき空の状態は",a:"厚い雲が空をおおっている",w:["雲がない","薄い雲がある","霧だけが出ている"],cat:"天気と気温",e:"雨が降るときは厚い雨雲（積乱雲・乱層雲）が空をおおっています。"},
    {q:"ヘチマの花で実がなるのは",a:"めばな",w:["おばな","どちらも","花びら"],cat:"植物の育ち",e:"ヘチマにはおばなとめばながあり、受粉するのはめばなです。実はめばなの根本にできます。"},
    {q:"植物の根の主なはたらきは",a:"水や養分を吸収し体を支える",w:["光合成をする","種をつける","花を咲かせる"],cat:"植物の育ち",e:"根は土から水と養分を吸い上げ、体を固定して支えます。根毛が吸収を助けます。"},
    {q:"植物の茎のはたらきは",a:"水や養分を体全体に運ぶ",w:["光合成をする","種を作る","空気を吸収する"],cat:"植物の育ち",e:"茎の中には道管（水）と師管（養分）があり、葉や実まで水と養分を運びます。"},
    {q:"植物の葉のはたらきとして正しいのは",a:"光合成と蒸散",w:["水を吸収する","根から養分を運ぶ","土から栄養を取る"],cat:"植物の育ち",e:"葉は光合成で養分を作り、気孔から水蒸気を出す蒸散も行います。"},
    {q:"人の体の骨の数はおよそ",a:"200本",w:["100本","300本","50本"],cat:"体のつくりと運動",e:"赤ちゃんは約300本の骨がありますが、成長とともに結合して大人は約206本になります。"},
    {q:"骨のはたらきとして正しくないものは",a:"体温を作る",w:["体を支える","内臓を守る","体を動かす支点になる"],cat:"体のつくりと運動",e:"体温を作るのは主に筋肉の運動です。骨の役割は①体を支える②内臓を守る③動きの支点になることです。"},
    {q:"電池を並列につなぐと電球の明るさは直列より",a:"暗くなる",w:["明るくなる","変わらない","消える"],cat:"電気のはたらき",e:"並列つなぎは電圧が1本分のままなので直列より暗くなりますが、電池は長持ちします。"},
    {q:"豆電球が光るのに必要な条件は",a:"回路が完成している（つながっている）",w:["電池が2つ以上ある","スイッチがある","電線が長い"],cat:"電気のはたらき",e:"電気が流れるには回路（ひとつながりの道）が完成していることが必要です。"},
    {q:"水を入れた注射器を押したとき体積が変わらない理由は",a:"水は圧縮できないから",w:["水が重いから","注射器が弱いから","空気が混じっているから"],cat:"空気と水",e:"水（液体）は力を加えても体積がほとんど変わりません。空気（気体）は圧縮できます。"},
    {q:"北極星の位置は常に",a:"ほぼ北の空に見える",w:["東の空","南の空","西の空"],cat:"星と月",e:"北極星はほぼ地球の自転軸の延長上にあるため、一晩中ほぼ同じ北の位置に見えます。"},
    {q:"月が満ちて欠けていく周期は約",a:"1ヶ月（30日）",w:["1週間","1年","半年"],cat:"星と月",e:"月は約29.5日で地球を1周するため、新月→上弦→満月→下弦→新月と約1か月で変化します。"},
    {q:"夏の大三角形を作る星「ベガ」があるのは",a:"こと座",w:["わし座","はくちょう座","さそり座"],cat:"星と月",e:"夏の大三角はベガ（こと座）・デネブ（はくちょう座）・アルタイル（わし座）の3つです。"},
    {q:"夏に南の空に見える赤い星「アンタレス」があるのは",a:"さそり座",w:["オリオン座","しし座","おうし座"],cat:"星と月",e:"アンタレスはさそり座の心臓部にある赤い巨星です。夏の夜、南の空で赤く光ります。"},
    {q:"水が氷になると体積は",a:"大きくなる",w:["小さくなる","変わらない","なくなる"],cat:"ものの体積",e:"水は例外的に凍ると体積が約1.1倍に増えます。だからペットボトルに水を入れて凍らせると膨らみます。"},
    {q:"水を熱すると100℃で",a:"沸騰して水蒸気になる",w:["冷たくなる","固まる","重くなる"],cat:"ものの体積",e:"水は100℃になると沸騰し、液体から気体（水蒸気）に変化します。"},
    {q:"鉄・水・空気を温めたとき体積の変化が最も小さいのは",a:"固体（鉄）",w:["液体（水）","気体（空気）","どれも同じ"],cat:"ものの体積",e:"温めたときの体積変化は気体が最も大きく、次に液体、固体は最も小さいです。"},
  ],
  5: [
    {q:"植物の種が発芽するために必要なものでないものは",a:"光",w:["水","空気","適切な温度"],cat:"植物の発芽",e:"発芽には水・空気・適切な温度の3つが必要です。光や肥料は発芽には必要ありません。"},
    {q:"インゲンマメの種のうち、発芽の養分が入っているのは",a:"子葉",w:["根","茎","葉"],cat:"植物の発芽",e:"インゲンマメの種の大部分は子葉で、発芽のための養分（でんぷんなど）が蓄えられています。"},
    {q:"メダカのオスとメスの違いとして正しいものは",a:"オスの背びれに切れ込みがある",w:["メスの方が大きい","オスの腹が膨らむ","メスの色が派手"],cat:"メダカ",e:"オスは背びれに切れ込みがありしりびれが平行四辺形。メスは腹がふくらみ背びれに切れ込みがありません。"},
    {q:"川の上流に多い石の特徴は",a:"角ばっている",w:["丸くなっている","平たい","小さくてなめらか"],cat:"流水のはたらき",e:"上流は流れが速く岩がぶつかって砕けるため角ばっています。下流では水に削られて丸くなります。"},
    {q:"川の流れが速いところに多いのは",a:"侵食作用",w:["堆積作用","運搬作用","風化作用"],cat:"流水のはたらき",e:"流れが速いところでは川底や岸を削る侵食、流れが遅いところでは土砂が積もる堆積が起こります。"},
    {q:"食塩を水に溶かすと水溶液は",a:"透明になる",w:["白くにごる","黄色くなる","固まる"],cat:"もののとけ方",e:"食塩は水に溶けて見えなくなりますが、なくなったわけではなく重さは変わりません。"},
    {q:"食塩水から食塩を取り出す方法は",a:"蒸発させる",w:["冷やす","ろ過する","加熱する"],cat:"もののとけ方",e:"食塩は水温を上げても溶ける量がほぼ変わらないため、水を蒸発させて取り出す方法が有効です。"},
    {q:"雲はどこで作られるか",a:"上空で水蒸気が冷えて",w:["海で水が温められて","山から水が蒸発して","川の水が上がって"],cat:"天気の変化",e:"地表付近の空気が上昇して冷えると、水蒸気が小さな水の粒になって雲ができます。"},
    {q:"台風の進路として多いのは",a:"最初南から北西に進み後に北東へ",w:["常に北へ進む","常に東へ進む","南へ戻る"],cat:"天気の変化",e:"台風は貿易風に乗って北西に進んだ後、偏西風に乗って北東へと進路を変えます。"},
    {q:"振り子が1往復する時間が変わるのは何を変えたときか",a:"振り子の長さ",w:["おもりの重さ","振れ幅","糸の材料"],cat:"振り子",e:"振り子の周期は長さだけで決まり、重さや振れ幅は関係ありません。長いほど時間がかかります。"},
    {q:"電磁石のN極とS極を入れ替えるには",a:"電流の向きを変える",w:["コイルの巻き数を増やす","電圧を上げる","鉄芯を取り除く"],cat:"電流と電磁石",e:"電磁石のN極・S極は電流の向きで決まります。向きを変えるとN極とS極が入れ替わります。"},
    {q:"電磁石を強くする方法でないものは",a:"鉄芯の重さを増やす",w:["コイルの巻き数を増やす","電流を強くする","鉄芯を入れる"],cat:"電流と電磁石",e:"電磁石を強くするには①コイルの巻き数を増やす②電流を強くする③鉄芯を入れる、が有効です。"},
    {q:"人の体で血液をポンプのように送り出す器官は",a:"心臓",w:["肺","胃","肝臓"],cat:"人の体",e:"心臓は1分間に60〜80回ポンプのように動いて血液を全身に送り続けます。"},
    {q:"呼吸で体に取り込まれる気体は",a:"酸素",w:["窒素","二酸化炭素","水蒸気"],cat:"人の体",e:"呼吸で酸素を吸収し、二酸化炭素を外に出します。酸素は細胞でエネルギーを作るのに使われます。"},
    {q:"花粉を運ぶ役目をする生き物は",a:"ハチなどの昆虫",w:["ミミズ","クモ","カエル"],cat:"花のつくり",e:"花の蜜を集める昆虫が花粉を体につけて他の花に運びます。これを虫媒（ちゅうばい）といいます。"},
    {q:"受粉後に果実になる部分は",a:"子房",w:["めしべ","おしべ","花びら"],cat:"花のつくり",e:"おしべの花粉がめしべの柱頭に受粉すると、めしべの根元の子房が実に変化します。"},
    {q:"川が平野に出るとき、流れの速さは",a:"遅くなる",w:["速くなる","変わらない","一時止まる"],cat:"流水のはたらき",e:"川が平野に出ると傾斜がゆるくなり流れが遅くなります。土砂が積もり三角州ができることもあります。"},
    {q:"天気予報の雲画像で使う衛星は",a:"気象衛星",w:["通信衛星","放送衛星","偵察衛星"],cat:"天気の変化",e:"日本では「ひまわり」という気象衛星が雲の動きを撮影し、天気予報に活用されています。"},
    {q:"食塩は水の温度が上がると溶ける量は",a:"ほとんど変わらない",w:["大幅に増える","大幅に減る","溶けなくなる"],cat:"もののとけ方",e:"食塩は水温が上がっても溶ける量がほとんど変わりません。一方ミョウバンは温度で大きく変わります。"},
    {q:"ミョウバンは水を冷やすと",a:"結晶が出てくる",w:["溶けたまま","蒸発する","色が変わる"],cat:"もののとけ方",e:"ミョウバンは水温が下がると溶けられる量が減り、余分な分が結晶として出てきます。"},
    {q:"光合成で植物が吸収するものは",a:"二酸化炭素と水（と光）",w:["酸素と水","窒素と光","酸素と二酸化炭素"],cat:"植物の発芽",e:"光合成：二酸化炭素＋水→（光）→でんぷん＋酸素。二酸化炭素は気孔から、水は根から吸収します。"},
    {q:"光合成で植物が放出するものは",a:"酸素",w:["二酸化炭素","窒素","水素"],cat:"植物の発芽",e:"植物は光合成で二酸化炭素と水からでんぷんを作り、酸素を出します。"},
    {q:"植物の葉に日光が当たると作られるものは",a:"でんぷん",w:["タンパク質","食塩","油"],cat:"植物の発芽",e:"葉でできたでんぷんはヨウ素液で青紫色に変わることで確認できます。"},
    {q:"発芽に光が必要かどうかを調べる実験で変える条件は",a:"光だけを変え、他の条件は同じにする",w:["全ての条件を変える","水と光を同時に変える","何も変えない"],cat:"植物の発芽",e:"実験では調べたい条件だけを変えて他を同じにします。これを対照実験といいます。"},
    {q:"メダカの卵が孵化するまでの日数は水温25℃で約",a:"10日",w:["3日","30日","100日"],cat:"メダカ",e:"メダカの卵は水温25℃で約10日で孵化します。水温が低いと日数がかかります。"},
    {q:"メダカのメスに見られる特徴は",a:"腹びれが小さく背びれに切れ込みなし",w:["背びれに切れ込みがある","ひれが全体的に大きい","体が細い"],cat:"メダカ",e:"メスは腹がふくらみ、背びれに切れ込みがなく、しりびれが三角形に近い形をしています。"},
    {q:"川が曲がっているとき削れるのはどちら側か",a:"外側が削れ（侵食）、内側に積もる（堆積）",w:["内側が削れ外側に積もる","どちらも同じ","曲がりには関係ない"],cat:"流水のはたらき",e:"曲がった川では外側は流れが速く侵食され、内側は流れが遅く土砂が積もります。"},
    {q:"土砂が積もることを何というか",a:"堆積",w:["侵食","運搬","変成"],cat:"流水のはたらき",e:"川が運んだ土砂が積もることを堆積といいます。川の下流・河口付近でよく起こります。"},
    {q:"川が平野に出ると流れは",a:"遅くなり土砂が積もりやすい",w:["速くなる","変わらない","一時止まる"],cat:"流水のはたらき",e:"平野では川の傾斜がゆるくなり流れが遅くなるため、土砂が積もって扇状地や三角州ができます。"},
    {q:"水100gに食塩を溶かすとき、溶かしても重さは",a:"変わらない（水+食塩の合計のまま）",w:["軽くなる","重くなる","なくなる"],cat:"もののとけ方",e:"物が溶けても重さは変わりません。食塩が見えなくなっても水の中に存在しています。"},
    {q:"ホウ酸は水の温度が上がると溶ける量は",a:"大幅に増える",w:["ほとんど変わらない","減る","溶けなくなる"],cat:"もののとけ方",e:"ミョウバン・ホウ酸などは温度が上がると大幅に溶ける量が増えます。食塩はほぼ変わりません。"},
    {q:"食塩水を蒸発させると最後に残るのは",a:"食塩の結晶",w:["水","砂糖","何も残らない"],cat:"もののとけ方",e:"水を蒸発させると、溶けていた食塩が結晶として出てきます。この方法を蒸発乾固といいます。"},
    {q:"低気圧の中心付近では天気は",a:"悪くなりやすい（雨・風）",w:["晴れやすい","変わらない","気温が上がる"],cat:"天気の変化",e:"低気圧の中心では空気が上昇して雲ができやすく、天気が悪くなりやすいです。"},

    {q:"地図記号で○の中に点があるのは",a:"市役所",w:["学校","消防署","警察署"],cat:"地図の見方",e:"市役所の地図記号は○の中に点（・）です。町村役場は○だけ、消防署はハシゴの記号、警察署は×状の記号です。"},
    {q:"地図記号でXのようなマークは",a:"警察署",w:["消防署","病院","市役所"],cat:"地図の見方",e:"警察署の地図記号は警棒（さくら）2本を交差させた×状です。消防署はハシゴ型の記号です。"},
    {q:"地図の縮尺が25000分の1のとき地図上の1cmは実際に何mか",a:"250m",w:["25m","2500m","25000m"],cat:"地図の見方",e:"1cm × 25000 = 25000cm = 250mです。縮尺の計算は「地図上の長さ × 縮尺の分母」で実際の長さが出ます。"},
    {q:"東北地方に含まれない県は",a:"茨城県",w:["秋田県","山形県","岩手県"],cat:"都道府県",e:"東北地方は青森・岩手・宮城・秋田・山形・福島の6県です。茨城県は関東地方です。"},
    {q:"岐阜県の県庁所在地は",a:"岐阜市",w:["高山市","大垣市","多治見市"],cat:"都道府県",e:"岐阜県は海に面していない内陸県で、県庁所在地は岐阜市です。高山市は飛騨地方の観光地として有名です。"},
    {q:"島根県の県庁所在地は",a:"松江市",w:["米子市","出雲市","益田市"],cat:"都道府県",e:"島根県の県庁所在地は松江市です。出雲大社がある出雲市と間違えやすいので注意しましょう。"},
    {q:"宮城県の県庁所在地は",a:"仙台市",w:["石巻市","気仙沼市","大崎市"],cat:"都道府県",e:"仙台市は東北地方最大の都市で「杜（もり）の都」とも呼ばれます。政令指定都市です。"},
    {q:"岩手県の県庁所在地は",a:"盛岡市",w:["一関市","奥州市","釜石市"],cat:"都道府県",e:"岩手県は面積が北海道に次いで全国2位の広さです。県庁所在地は盛岡市です。"},
    {q:"福岡県の県庁所在地は",a:"福岡市",w:["北九州市","久留米市","飯塚市"],cat:"都道府県",e:"福岡市は九州最大の都市で政令指定都市です。北九州市も政令指定都市ですが県庁は福岡市にあります。"},
    {q:"熊本県の県庁所在地は",a:"熊本市",w:["八代市","天草市","玉名市"],cat:"都道府県",e:"熊本市は「火の国」熊本県の中心都市で政令指定都市です。熊本城が有名です。"},
    {q:"大阪府の府庁所在地は",a:"大阪市",w:["堺市","枚方市","東大阪市"],cat:"都道府県",e:"大阪市は関西最大の都市で政令指定都市。府庁は大阪市にあります。堺市も政令指定都市ですが府庁はありません。"},
    {q:"京都府の府庁所在地は",a:"京都市",w:["宇治市","舞鶴市","福知山市"],cat:"都道府県",e:"京都市は日本の古都で、多くの世界遺産があります。794年から約1000年間、都が置かれた都市です。"},
    {q:"中部地方に含まれる県の数は",a:"9県",w:["7県","8県","10県"],cat:"都道府県",e:"中部地方は新潟・富山・石川・福井・山梨・長野・岐阜・静岡・愛知の9県です。"},
    {q:"九州地方に含まれる県の数は",a:"7県",w:["6県","8県","5県"],cat:"都道府県",e:"九州地方は福岡・佐賀・長崎・熊本・大分・宮崎・鹿児島の7県です。沖縄県は九州地方に含める場合もあります。"},
    {q:"日本の川の特徴として正しいのは",a:"外国の川に比べて短くて急",w:["外国の川より長くてゆるやか","外国の川より幅が広い","水量が少ない"],cat:"地図の見方",e:"日本は山が多く国土が狭いため川は短くて傾斜が急です。外国（アマゾン川など）と比べて激流が多いです。"},
    {q:"ごみの処理の流れで正しいのは",a:"収集→中間処理施設→最終処分場",w:["収集→最終処分場→中間処理","収集→リサイクル→収集","最終処分場→収集→処理"],cat:"くらしと環境",e:"ごみは収集後、焼却などの中間処理をしてから最終処分場（埋め立て地）に運ばれます。資源ごみは再利用されます。"},
    {q:"水道の水が家庭に届くまでの流れで正しいのは",a:"川・ダム→浄水場→家庭",w:["家庭→浄水場→川","川→下水処理場→家庭","ダム→工場→浄水場→家庭"],cat:"くらしと環境",e:"川やダムの水は浄水場でろ過・消毒されてきれいになり、水道管を通って家庭に届きます。"},
    {q:"下水処理場の役割は",a:"使った水をきれいにして川や海に戻す",w:["雨水を集める","地下水を汲み上げる","水道水を作る"],cat:"くらしと環境",e:"家庭や工場から出た汚れた水は下水処理場できれいにされてから川や海に戻されます。"},
    {q:"日本の主な山脈で東北地方を南北に走るのは",a:"奥羽山脈",w:["飛騨山脈","赤石山脈","木曽山脈"],cat:"地図の見方",e:"奥羽山脈は東北地方を南北に貫く日本最長の山脈です。飛騨・赤石・木曽は「日本アルプス」と呼ばれる中部の山脈です。"},
    {q:"海抜0mより低い土地（ゼロメートル地帯）が多いのは",a:"東京・大阪・名古屋の沿岸低地",w:["京都・奈良の盆地","札幌・旭川の平野","長野・松本の高地"],cat:"地図の見方",e:"これらの地域では昔から地下水を大量に使用したため地盤が沈下し、海面より低い土地（ゼロメートル地帯）が広がっています。"},
    {q:"地図記号で桑畑を表すのは",a:"×を組み合わせた記号",w:["○（丸）","三角形","平行線"],cat:"地図の見方",e:"桑の葉を表す×状の記号が桑畑の地図記号です。かつて養蚕（蚕を育てること）が盛んで桑畑が多くありました。"},
    {q:"消防署の地図記号は",a:"ハシゴを図案化したもの",w:["桜の花","警棒を交差した形","Xマーク"],cat:"地図の見方",e:"消防署の地図記号は消防車のハシゴ（はしご車）をデザインした記号です。警察署とよく混同されます。"},
    {q:"警察署の地図記号は",a:"警棒（さくら）を交差した形",w:["ハシゴ","○の中に点","桜の花"],cat:"地図の見方",e:"警察署の地図記号は警棒を×状に交差させた形です。消防署はハシゴ型、市役所は○の中に点の記号です。"},
  ],
  5: [
    {q:"日本の農業で最も多く生産されている作物は",a:"米",w:["小麦","大豆","トウモロコシ"],cat:"農業",e:"日本は古くから稲作が盛んで、米は最も生産量が多い作物です。小麦は大部分を輸入に頼っています。"},
    {q:"野菜を季節より早く出荷する栽培方法を何というか",a:"促成栽培",w:["有機栽培","露地栽培","抑制栽培"],cat:"農業",e:"促成栽培はビニールハウスなどで温度管理し、旬より早く出荷する方法です。高知・宮崎が有名です。"},
    {q:"食料自給率が低いと困る主な理由は",a:"輸入が止まると食料不足になるから",w:["輸出が増えすぎるから","農地が余るから","農家が儲かりすぎるから"],cat:"農業",e:"食料自給率が低いと輸入が止まったとき（戦争・災害など）に食料が足りなくなる危険があります。"},
    {q:"日本の農業の問題点として正しいのは",a:"農業従事者の高齢化",w:["農地が増えすぎている","若い農家が多すぎる","農産物が余っている"],cat:"農業",e:"農家の平均年齢は年々上昇し、後継者不足が深刻です。耕作放棄地も増えています。"},
    {q:"日本の漁業で生産量が多い漁業の種類は",a:"沖合漁業",w:["遠洋漁業","沿岸漁業","養殖業"],cat:"水産業",e:"沖合漁業は日本近海で行う漁業で、生産量が最も多いです。遠洋漁業は200海里問題で減少しました。"},
    {q:"養殖業で有名な真珠の産地はどこか",a:"三重県",w:["北海道","静岡県","宮城県"],cat:"水産業",e:"三重県の英虞湾（あごわん）はアコヤガイを使った真珠の養殖で世界的に有名です。"},
    {q:"200海里水域（排他的経済水域）を設けた目的は",a:"自国の水産資源を守るため",w:["観光客を呼ぶため","軍事的防衛のため","島を守るため"],cat:"水産業",e:"各国が自国の海岸から200海里（約370km）以内の水産資源を管理する権利を宣言した制度です。"},
    {q:"水産業で魚の数が減っている主な原因は",a:"獲りすぎ（乱獲）と環境の変化",w:["魚が陸に上がっているから","海の水が増えたから","潮の流れが止まったから"],cat:"水産業",e:"乱獲による魚の減少と、海洋汚染・海水温上昇などの環境変化が水産資源を減らしています。"},
    {q:"日本の工業地帯で最大の生産額を誇るのは",a:"中京工業地帯",w:["京浜工業地帯","阪神工業地帯","北九州工業地帯"],cat:"工業",e:"愛知県を中心とする中京工業地帯はトヨタ自動車などの自動車産業が集積し、生産額が日本最大です。"},
    {q:"自動車工業が特に盛んな都市はどれか",a:"豊田市（愛知県）",w:["神戸市","横浜市","仙台市"],cat:"工業",e:"豊田市はトヨタ自動車の本社がある都市で、市名もトヨタにちなんで改名されました。"},
    {q:"石油化学コンビナートが発達しやすい場所は",a:"海沿い",w:["山の中","内陸の高地","島の中心"],cat:"工業",e:"石油はタンカーで海外から輸入するため、海沿い（臨海部）の方が原料の輸送が便利です。"},
    {q:"日本の国土の約何割が山地・丘陵地か",a:"約7割",w:["約3割","約5割","約9割"],cat:"国土の地形",e:"日本の国土の約4分の3（約75%）が山地・丘陵地で、平地は少ないです。"},
    {q:"日本最長の川はどれか",a:"信濃川",w:["利根川","石狩川","最上川"],cat:"国土の地形",e:"信濃川（長野県〜新潟県）は全長367kmで日本最長の川です。利根川は流域面積が日本最大です。"},
    {q:"日本アルプスに含まれない山脈はどれか",a:"奥羽山脈",w:["飛騨山脈（北アルプス）","赤石山脈（南アルプス）","木曽山脈（中央アルプス）"],cat:"国土の地形",e:"日本アルプスは飛騨（北）・木曽（中央）・赤石（南）の3山脈です。奥羽山脈は東北地方の山脈です。"},
    {q:"日本の人口が最も多い都道府県は",a:"東京都",w:["神奈川県","大阪府","北海道"],cat:"人口・都市",e:"東京都の人口は約1,400万人で日本最多です。2位は神奈川県、3位は大阪府です。"},
    {q:"少子高齢化とはどのような現象か",a:"子どもが減り高齢者が増える社会現象",w:["人口が急増すること","外国人が増えること","都市に人が集まること"],cat:"人口・都市",e:"少子化（子どもが減る）と高齢化（65歳以上が増える）が同時に進む現象です。日本は世界でも高齢化が進んでいます。"},
    {q:"日本の人口が集中している地域はどこか",a:"太平洋ベルト",w:["日本海側","北海道","山間部"],cat:"人口・都市",e:"太平洋ベルトは関東〜東海〜近畿〜九州北部の太平洋沿いの工業・人口集中地帯です。"},
    {q:"日本が多く輸出しているものはどれか",a:"自動車・機械類",w:["石油・天然ガス","鉄鉱石・石炭","食料品"],cat:"貿易",e:"日本は自動車・電気機械・精密機械などを輸出しています。石油・鉄鉱石・石炭は輸入しています。"},
    {q:"日本が最も多く石油を輸入している地域は",a:"中東",w:["東南アジア","北米","ヨーロッパ"],cat:"貿易",e:"日本の石油輸入の約90%が中東（サウジアラビア・UAEなど）からです。エネルギー資源の多くを輸入に頼っています。"},
    {q:"日本が輸入に頼っている資源として正しいのは",a:"石油・石炭・鉄鉱石",w:["米・野菜・果物","自動車・電気製品","漁業・農業製品"],cat:"貿易",e:"日本はエネルギー資源（石油・石炭・天然ガス）や鉄鉱石などの鉱物資源のほとんどを輸入しています。"},
    {q:"促成栽培が盛んな地域はどこか",a:"高知県・宮崎県などの暖かい地域",w:["北海道・東北などの寒い地域","長野・岩手などの高原","都市部の近郊"],cat:"農業",e:"温暖な気候のため高知・宮崎はビニールハウスで野菜を早く育て、冬でも出荷できます。"},
    {q:"抑制栽培とは何か",a:"高地や寒冷地で作物の出荷を遅らせる栽培",w:["化学肥料を使わない農業","ビニールハウスを使う農業","季節より早く出荷する農業"],cat:"農業",e:"抑制栽培は標高の高い冷涼な場所でレタスなどを育て、旬より遅い時期に出荷する方法です。長野県が有名です。"},
    {q:"日本の食料自給率（カロリーベース）は約何%か",a:"約40%",w:["約70%","約20%","約90%"],cat:"農業",e:"日本の食料自給率（カロリーベース）は約38〜40%で先進国の中で非常に低い水準です。"},
    {q:"日本で米の生産量が最も多い地方はどこか",a:"東北・北陸地方",w:["関東地方","九州地方","四国地方"],cat:"農業",e:"東北（新潟・秋田など）と北陸（富山・石川など）は気候・水・土地条件がよく米の生産が盛んです。"},
    {q:"日本の漁業で「栽培漁業」とは何か",a:"魚を育てて自然の海に放し成長させる",w:["生け簀で魚を育て出荷する","船で魚を追いかける","養殖と同じ意味"],cat:"水産業",e:"栽培漁業は魚や貝の稚魚を育てて自然の海に放流し、成長してから漁獲する方法です。養殖とは異なります。"},
    {q:"遠洋漁業が減った主な理由は",a:"各国が200海里水域を設定したため",w:["船が故障するから","魚が遠くに行かなくなったから","燃料が安くなったから"],cat:"水産業",e:"1970年代に各国が200海里水域を設定し、日本の遠洋漁業が外国海域で操業できなくなりました。"},
    {q:"日本近海で暖流と寒流がぶつかる「潮目」に魚が多い理由は",a:"プランクトンが豊富で魚のえさになるから",w:["水温が高いから","水が澄んでいるから","波が静かだから"],cat:"水産業",e:"暖流と寒流がぶつかる潮目では栄養分が豊富でプランクトンが育ちやすく、魚のえさが多いです。"},
    {q:"日本の工業地帯で最も生産額が大きいのは",a:"中京工業地帯",w:["京浜工業地帯","阪神工業地帯","北九州工業地帯"],cat:"工業",e:"愛知県を中心とする中京工業地帯はトヨタなどの自動車産業が中心で生産額が日本最大です。"},
    {q:"IC（集積回路）工場が多い場所の特徴は",a:"高速道路沿いや空港の近く（内陸）",w:["港の近く（臨海部）","山の中","農地の多い地域"],cat:"工業",e:"ICは軽くて高価なので航空機や高速道路で輸送します。清潔な環境が必要なため内陸に多いです。"},
    {q:"印刷・出版業が集中している都市はどこか",a:"東京",w:["大阪","名古屋","福岡"],cat:"工業",e:"出版社・新聞社・印刷会社は情報が集まる首都・東京に集中しています。"},
    {q:"環境問題「地球温暖化」の主な原因は",a:"二酸化炭素などの温室効果ガスの増加",w:["オゾン層が厚くなったから","核実験の影響","森林面積の増加"],cat:"環境",e:"石油・石炭などを燃やすと二酸化炭素が増え、地球全体の気温が上昇する地球温暖化が進んでいます。"},
    {q:"再生可能エネルギーに含まれないものは",a:"石油",w:["太陽光","風力","地熱"],cat:"エネルギー",e:"再生可能エネルギーは自然から得られる枯渇しないエネルギーです（太陽光・風力・地熱・水力など）。石油は枯渇する化石燃料です。"},
    {q:"都市部への人口集中を「過密」というとき、地方で人口が減ることを",a:"過疎",w:["平均化","均等化","分散"],cat:"人口・都市",e:"過疎は地方で人口が極端に減少する現象です。学校・病院・交通が維持できなくなる問題があります。"},
    {q:"農業で「有機農業」とは何か",a:"化学肥料や農薬をできるだけ使わない農業",w:["大規模な機械を使う農業","外国の農法を取り入れた農業","遺伝子組み換え作物を使う農業"],cat:"農業",e:"有機農業は化学肥料・農薬を使わず自然の力を活かす農業で、安全性や環境への配慮から注目されています。"},
    {q:"日本の国土の約何割が山地・丘陵地か",a:"約7割",w:["約3割","約5割","約9割"],cat:"国土の地形",e:"日本の国土の約75%が山地・丘陵地で平地は少なく、沿岸部の平野・盆地に人口が集中しています。"},
    {q:"日本最長の川はどれか",a:"信濃川",w:["利根川","石狩川","最上川"],cat:"国土の地形",e:"信濃川（長野・新潟）が全長約367kmで日本最長です。利根川（関東）は流域面積が最大です。"},
    {q:"日本の輸送手段で国内貨物の約半分を担うのは",a:"自動車（トラック）",w:["鉄道","船","航空機"],cat:"運輸・通信",e:"国内貨物輸送の約50%以上を自動車（トラック）が担っています。細かい配送ができる利点があります。"},

    {q:"「馬」を英語で言うと",a:"horse",w:["cow","sheep","goat"],cat:"動物",e:"horse（ホース）＝馬。cow＝牛、sheep＝羊、goat＝ヤギです。"},
    {q:"「象」を英語で言うと",a:"elephant",w:["lion","tiger","bear"],cat:"動物",e:"elephant（エレファント）＝象。lion＝ライオン、tiger＝トラ、bear＝クマです。"},
    {q:"「牛」を英語で言うと",a:"cow",w:["horse","pig","sheep"],cat:"動物",e:"cow（カウ）＝牛（主に雌）。horse＝馬、pig＝ブタ、sheep＝羊です。"},
    {q:"「火曜日」を英語で言うと",a:"Tuesday",w:["Monday","Wednesday","Thursday"],cat:"曜日",e:"Tuesday（チューズデイ）＝火曜日。月曜Monday・水曜Wednesday・木曜Thursdayと混同しやすいです。"},
    {q:"「水曜日」を英語で言うと",a:"Wednesday",w:["Tuesday","Thursday","Friday"],cat:"曜日",e:"Wednesday（ウェンズデイ）＝水曜日。綴りのdが発音されないので注意。"},
    {q:"「木曜日」を英語で言うと",a:"Thursday",w:["Wednesday","Friday","Saturday"],cat:"曜日",e:"Thursday（サーズデイ）＝木曜日。Tuesday（火）・Thursday（木）は混同しやすいので注意。"},
    {q:"「土曜日」を英語で言うと",a:"Saturday",w:["Friday","Sunday","Monday"],cat:"曜日",e:"Saturday（サタデイ）＝土曜日。Friday＝金曜、Sunday＝日曜、Monday＝月曜です。"},
    {q:"「春」を英語で言うと",a:"spring",w:["summer","autumn","winter"],cat:"季節",e:"spring（スプリング）＝春。summer＝夏、autumn（fall）＝秋、winter＝冬です。"},
    {q:"「秋」を英語で言うと",a:"autumn / fall",w:["spring","summer","winter"],cat:"季節",e:"秋はautumn（オータム）またはfall（フォール）と言います。fall（落ち葉が落ちる）はアメリカ英語です。"},
    {q:"「誕生日おめでとう」を英語で言うと",a:"Happy birthday!",w:["Good luck!","Congratulations!","Have fun!"],cat:"あいさつ",e:"Happy birthday（ハッピーバースデイ）＝誕生日おめでとう。Congratulations＝おめでとう（誕生日以外にも使えます）。"},
    {q:"「お元気ですか」を英語で言うと",a:"How are you?",w:["What are you?","Who are you?","Where are you?"],cat:"あいさつ",e:"How are you?（ハウアーユー）＝お元気ですか。返答は「I'm fine, thank you.」が基本です。"},
    {q:"「元気です」を英語で言うと",a:"I'm fine.",w:["I'm sad.","I'm sick.","I'm busy."],cat:"あいさつ",e:"I'm fine.（アイムファイン）＝元気です。sad＝悲しい、sick＝具合が悪い、busy＝忙しいです。"},
    {q:"「すみません（呼びかけ）」を英語で言うと",a:"Excuse me.",w:["I'm sorry.","Thank you.","Please."],cat:"あいさつ",e:"Excuse me（エクスキューズミー）＝すみません（呼びかけ・道を聞くとき）。I'm sorry＝ごめんなさい（謝罪）と使い分けます。"},
    {q:"「12」を英語で言うと",a:"twelve",w:["eleven","thirteen","twenty"],cat:"数",e:"twelve（トゥエルブ）＝12。eleven＝11、thirteen＝13、twenty＝20です。"},
    {q:"「15」を英語で言うと",a:"fifteen",w:["fourteen","sixteen","fifty"],cat:"数",e:"fifteen（フィフティーン）＝15。fifty（フィフティ）＝50と混同しやすいので注意。"},
    {q:"「30」を英語で言うと",a:"thirty",w:["thirteen","twenty","forty"],cat:"数",e:"thirty（サーティ）＝30。thirteen（サーティーン）＝13と混同しやすいので注意。"},
    {q:"「家」を英語で言うと",a:"house",w:["school","store","park"],cat:"場所",e:"house（ハウス）＝家（建物としての家）。home（ホーム）は「家族のいる家・故郷」のニュアンスです。"},
    {q:"「長い」を英語で言うと",a:"long",w:["short","tall","big"],cat:"形容詞",e:"long（ロング）＝長い。short＝短い、tall＝背が高い（人・木など）、big＝大きいです。"},
    {q:"「かっこいい・すてきな」を英語で言うと",a:"cool",w:["cute","nice","pretty"],cat:"形容詞",e:"cool（クール）＝かっこいい・すてきな。cute＝かわいい、nice＝すてきな・良い、pretty＝きれいなです。"},
    {q:"「きれいな・かわいい」を英語で言うと",a:"pretty / cute",w:["cool","big","long"],cat:"形容詞",e:"pretty（プリティ）＝きれいな・かわいい、cute（キュート）＝かわいい。どちらも使えます。"},
    {q:"「高い（値段・背）」を英語で言うと",a:"tall / high",w:["long","big","great"],cat:"形容詞",e:"背が高い→tall（タール）、位置・値段が高い→high（ハイ）。long＝長い、big＝大きいとは別です。"},
    {q:"「〜できません」を英語で言うと",a:"I can't ~.",w:["I don't ~.","I am not ~.","I won't ~."],cat:"日常表現",e:"I can't（アイキャント）＝〜できません。can＝できる・cannotの短縮形がcan'tです。"},
    {q:"「何がほしいですか」を英語で言うと",a:"What do you want?",w:["What do you like?","What can you do?","Where do you go?"],cat:"日常表現",e:"What do you want?（ワット ドゥ ユー ウォント）＝何がほしいですか。What do you like?＝何が好きですか。"},
    {q:"「どこに行きたいですか」を英語で言うと",a:"Where do you want to go?",w:["When do you go?","What do you want?","How do you go?"],cat:"日常表現",e:"Where do you want to go?（ウェア ドゥ ユー ウォント トゥ ゴー）＝どこに行きたいですか。"},
    {q:"「私は〜が上手ではありません」を英語で言うと",a:"I'm not good at ~.",w:["I don't like ~.","I can't ~.","I'm bad ~."],cat:"日常表現",e:"I'm not good at〜＝〜が得意ではありません。I'm good at〜＝〜が得意です。at の後は名詞か動名詞（-ing）がきます。"},
  ],
  5: [
    {q:"「算数」を英語で言うと",a:"math",w:["science","music","art"],cat:"教科",e:"math（マス）＝算数・数学。mathematics の略です。science＝理科、music＝音楽、art＝美術です。"},
    {q:"「理科」を英語で言うと",a:"science",w:["math","history","music"],cat:"教科",e:"science（サイエンス）＝理科・科学。math＝算数、history＝歴史・社会、music＝音楽です。"},
    {q:"「音楽」を英語で言うと",a:"music",w:["art","P.E.","science"],cat:"教科",e:"music（ミュージック）＝音楽。art＝美術、P.E.（Physical Education）＝体育、science＝理科です。"},
    {q:"「体育」を英語で言うと",a:"P.E.",w:["music","art","math"],cat:"教科",e:"P.E.（ピーイー）＝体育。Physical Education（フィジカル エデュケーション）の略です。"},
    {q:"「サッカー」を英語で言うと",a:"soccer",w:["baseball","tennis","basketball"],cat:"スポーツ",e:"soccer（ソッカー）＝サッカー。アメリカ英語です。イギリスではfootball（フットボール）と言います。"},
    {q:"「野球」を英語で言うと",a:"baseball",w:["soccer","volleyball","tennis"],cat:"スポーツ",e:"baseball（ベースボール）＝野球。base（塁）とball（ボール）を合わせた言葉です。"},
    {q:"「バスケットボール」を英語で言うと",a:"basketball",w:["volleyball","baseball","soccer"],cat:"スポーツ",e:"basketball（バスケットボール）＝バスケットボール。basket（かご）にballを入れるスポーツです。"},
    {q:"「水泳」を英語で言うと",a:"swimming",w:["running","jumping","cycling"],cat:"スポーツ",e:"swimming（スウィミング）＝水泳。swim の-ing形。running＝走ること、cycling＝自転車です。"},
    {q:"「公園」を英語で言うと",a:"park",w:["school","library","station"],cat:"場所",e:"park（パーク）＝公園。school＝学校、library＝図書館、station＝駅です。"},
    {q:"「図書館」を英語で言うと",a:"library",w:["hospital","park","museum"],cat:"場所",e:"library（ライブラリー）＝図書館。hospital＝病院、museum＝博物館と混同しやすいです。"},
    {q:"「病院」を英語で言うと",a:"hospital",w:["library","school","park"],cat:"場所",e:"hospital（ホスピタル）＝病院。library（図書館）・school（学校）と区別して覚えましょう。"},
    {q:"「駅」を英語で言うと",a:"station",w:["airport","park","hospital"],cat:"場所",e:"station（ステーション）＝駅。airport＝空港、park＝公園、hospital＝病院です。"},
    {q:"「速い」を英語で言うと",a:"fast",w:["slow","hard","soft"],cat:"形容詞",e:"fast（ファスト）＝速い。slow＝遅い、hard＝硬い・難しい、soft＝柔らかいです。"},
    {q:"「難しい」を英語で言うと",a:"difficult",w:["easy","funny","boring"],cat:"形容詞",e:"difficult（ディフィカルト）＝難しい。easy＝簡単な、funny＝おかしい・面白い、boring＝退屈なです。"},
    {q:"「おもしろい」を英語で言うと",a:"interesting",w:["boring","difficult","scary"],cat:"形容詞",e:"interesting（インタレスティング）＝興味深い・おもしろい。funny＝おかしくて笑える面白さ、boring＝退屈なです。"},
    {q:"「月曜日」を英語で言うと",a:"Monday",w:["Sunday","Tuesday","Wednesday"],cat:"曜日・月",e:"Monday（マンデイ）＝月曜日。Sun（太陽）→Sunday、Moon（月）→Mondayと覚えると便利です。"},
    {q:"「金曜日」を英語で言うと",a:"Friday",w:["Thursday","Saturday","Wednesday"],cat:"曜日・月",e:"Friday（フライデイ）＝金曜日。Thursday（木）＝サーズデイ、Saturday（土）＝サタデイです。"},
    {q:"「日曜日」を英語で言うと",a:"Sunday",w:["Monday","Saturday","Friday"],cat:"曜日・月",e:"Sunday（サンデイ）＝日曜日。Sun（太陽）から来ています。Monday（月）と混同しやすいです。"},
    {q:"「1月」を英語で言うと",a:"January",w:["February","March","April"],cat:"曜日・月",e:"January（ジャニュアリー）＝1月。February＝2月、March＝3月、April＝4月と続きます。"},
    {q:"「3月」を英語で言うと",a:"March",w:["January","May","June"],cat:"曜日・月",e:"March（マーチ）＝3月。January＝1月、May＝5月、June＝6月です。"},
    {q:"「夏」を英語で言うと",a:"summer",w:["winter","spring","autumn"],cat:"季節",e:"summer（サマー）＝夏。winter＝冬、spring＝春、autumn（fall）＝秋です。"},
    {q:"「冬」を英語で言うと",a:"winter",w:["summer","spring","autumn"],cat:"季節",e:"winter（ウィンター）＝冬。summer＝夏、spring＝春、autumn＝秋です。"},
    {q:"「〜できる」を英語で言うと",a:"can",w:["must","will","should"],cat:"文の構造",e:"can（キャン）＝〜できる（能力・可能）。must＝〜しなければならない、will＝〜するでしょう、should＝〜すべきです。"},
    {q:"「毎日」を英語で言うと",a:"every day",w:["every week","sometimes","never"],cat:"文の構造",e:"every day（エブリデイ）＝毎日。every week＝毎週、sometimes＝ときどき、never＝決して〜しないです。"},
    {q:"「〜が好きではない」を英語で言うと",a:"I don't like ~.",w:["I like ~.","I want ~.","I can ~."],cat:"文の構造",e:"I don't like〜＝〜が好きではない。I like〜の否定形で、don't（do not）を使います。"},
    {q:"「何時ですか」を英語で言うと",a:"What time is it?",w:["Where is it?","How are you?","What day is it?"],cat:"日常表現",e:"What time is it?（ワット タイム イズ イット）＝今何時ですか。What day is it?＝今日は何曜日ですか。"},
    {q:"「何曜日ですか」を英語で言うと",a:"What day is it?",w:["What time is it?","What is it?","Where is it?"],cat:"日常表現",e:"What day is it?（ワット デイ イズ イット）＝今日は何曜日ですか。What time is it?＝何時ですかと区別しましょう。"},
    {q:"「〜が得意です」を英語で言うと",a:"I'm good at ~.",w:["I like ~.","I can ~.","I want ~."],cat:"日常表現",e:"I'm good at〜（アイムグッドアット）＝〜が得意です。I'm not good at〜＝得意ではありません。"},
    {q:"「いくらですか」を英語で言うと",a:"How much is it?",w:["What is it?","Where is it?","How is it?"],cat:"日常表現",e:"How much is it?（ハウマッチ イズ イット）＝いくらですか。How much＝いくら・どのくらいの量です。"},
    {q:"「どこですか」を英語で言うと",a:"Where is ~?",w:["What is ~?","How is ~?","When is ~?"],cat:"日常表現",e:"Where is〜?（ウェア イズ）＝〜はどこですか。What is〜?＝何ですか、When is〜?＝いつですかです。"},
    {q:"「国語」を英語で言うと",a:"Japanese",w:["English","math","science"],cat:"教科",e:"日本の学校の国語はJapanese（ジャパニーズ）＝日本語です。English＝英語、math＝算数です。"},
    {q:"「社会」を英語で言うと",a:"social studies",w:["science","history","P.E."],cat:"教科",e:"social studies（ソーシャル スタディーズ）＝社会科。science＝理科、history＝歴史です。"},
    {q:"「美術」を英語で言うと",a:"art",w:["music","P.E.","math"],cat:"教科",e:"art（アート）＝美術・芸術。music＝音楽、P.E.＝体育、math＝算数です。"},
    {q:"「テニス」を英語で言うと",a:"tennis",w:["soccer","baseball","golf"],cat:"スポーツ",e:"tennis（テニス）＝テニス。soccer＝サッカー、baseball＝野球、golf＝ゴルフです。"},
    {q:"「バレーボール」を英語で言うと",a:"volleyball",w:["basketball","baseball","tennis"],cat:"スポーツ",e:"volleyball（バレーボール）＝バレーボール。basketball（バスケ）と混同しやすいので注意。"},
    {q:"「博物館」を英語で言うと",a:"museum",w:["library","hospital","park"],cat:"場所",e:"museum（ミュージアム）＝博物館・美術館。library＝図書館、hospital＝病院と区別しましょう。"},
    {q:"「空港」を英語で言うと",a:"airport",w:["station","port","hotel"],cat:"場所",e:"airport（エアポート）＝空港。air（空）＋port（港）の組み合わせです。station＝駅、port＝港です。"},
    {q:"「おいしい」を英語で言うと",a:"delicious",w:["sweet","sour","salty"],cat:"形容詞",e:"delicious（デリシャス）＝おいしい。sweet＝甘い、sour＝すっぱい、salty＝塩辛いです。"},
    {q:"「怖い」を英語で言うと",a:"scary",w:["funny","sad","angry"],cat:"形容詞",e:"scary（スケアリー）＝怖い・恐ろしい。funny＝おかしい、sad＝悲しい、angry＝怒っているです。"},
    {q:"「2月」を英語で言うと",a:"February",w:["January","March","April"],cat:"曜日・月",e:"February（フェブラリー）＝2月。綴りにrが2つあり難しいです。January＝1月、March＝3月です。"},
    {q:"「6月」を英語で言うと",a:"June",w:["May","July","August"],cat:"曜日・月",e:"June（ジューン）＝6月。May＝5月、July＝7月、August＝8月です。"},
    {q:"「9月」を英語で言うと",a:"September",w:["August","October","November"],cat:"曜日・月",e:"September（セプテンバー）＝9月。August＝8月、October＝10月、November＝11月です。"},
    {q:"「12月」を英語で言うと",a:"December",w:["November","October","January"],cat:"曜日・月",e:"December（ディセンバー）＝12月。November＝11月、October＝10月です。クリスマスのある月です。"},
    {q:"「〜しなければならない」を英語で言うと",a:"I must ~. / I have to ~.",w:["I can ~.","I will ~.","I may ~."],cat:"文の構造",e:"must（マスト）またはhave to（ハブトゥ）＝〜しなければならない。can＝できる、will＝〜するでしょうです。"},
    {q:"「〜するでしょう」を英語で言うと",a:"I will ~.",w:["I must ~.","I can ~.","I should ~."],cat:"文の構造",e:"will（ウィル）＝〜するでしょう（未来・意志）。must＝しなければならない、should＝すべきです。"},
    {q:"「何人家族ですか」を英語で言うと",a:"How many people are in your family?",w:["Where is your family?","What is your family?","Who is your family?"],cat:"日常表現",e:"How many〜?（ハウメニー）＝いくつ・何人の〜ですか。数を聞くときはHow manyを使います。"},
    {q:"「あなたはどこ出身ですか」を英語で言うと",a:"Where are you from?",w:["Where do you go?","Where are you?","Where do you live?"],cat:"日常表現",e:"Where are you from?（ウェア アー ユー フロム）＝どこ出身ですか。Where do you live?＝どこに住んでいますかです。"},
    {q:"「私は〇〇出身です」を英語で言うと",a:"I'm from ~.",w:["I go to ~.","I live ~.","I come ~."],cat:"日常表現",e:"I'm from〜（アイムフロム）＝私は〜出身です。I live in〜＝〜に住んでいますと区別しましょう。"},
    {q:"「今日の天気はどうですか」を英語で言うと",a:"How's the weather today?",w:["What is today?","Where is the weather?","Why is it raining?"],cat:"日常表現",e:"How's the weather today?（ハウズ ザ ウェザー トゥデイ）＝今日の天気はどうですか。"},
    {q:"「What's your name?」の答え方は",a:"My name is ~. / I'm ~.",w:["I'm fine.","I like ~.","I go to ~."],cat:"日常表現",e:"What's your name?＝名前は何ですか。My name is〜またはI'm〜で答えます。I'm fine.は「元気です」の答えです。"},
    {q:"「〜が得意ではない」を英語で言うと",a:"I'm not good at ~.",w:["I hate ~.","I can't do ~.","I don't like ~."],cat:"日常表現",e:"I'm not good at〜＝〜が得意ではない。I'm good at〜の否定形。I don't like〜＝好きではないとは意味が違います。"},
    {q:"「私は〜に住んでいます」を英語で言うと",a:"I live in ~.",w:["I'm from ~.","I go to ~.","I stay at ~."],cat:"日常表現",e:"I live in〜（アイリブイン）＝〜に住んでいます。I'm from〜＝〜出身ですと混同しないように。"},
    {q:"「いくつ持っていますか」を英語で言うと",a:"How many do you have?",w:["How much do you have?","What do you have?","Where do you have?"],cat:"日常表現",e:"How many do you have?＝いくつ持っていますか。How much?＝いくら（値段・量）、How many?＝数（数えられるもの）です。"},
    {q:"「〜が得意です」を英語で言うと",a:"I'm good at ~.",w:["I like ~.","I can ~.","I want ~."],cat:"日常表現",e:"I'm good at〜＝〜が得意です。I like〜＝好き、I can〜＝できると意味が違うので区別しましょう。"},

  6: [
    {q:"「行く」の過去形（went / go / goes）",a:"went",w:["go","goes","going"],cat:"過去形",e:"go（行く）の過去形はwent（ウェント）です。不規則変化なのでそのまま覚えましょう。goes は三人称単数現在形。"},
    {q:"「食べる」の過去形（eat）",a:"ate",w:["eat","eats","eating"],cat:"過去形",e:"eat（食べる）の過去形はate（エイト）です。不規則変化。数字の8（eight）と発音が同じです。"},
    {q:"「見る」の過去形（see）",a:"saw",w:["see","sees","seeing"],cat:"過去形",e:"see（見る）の過去形はsaw（ソー）です。不規則変化。鋸（saw）と同じ綴りです。"},

    {q:"「読点（、）」の使い方として正しいのは",a:"文の意味を区切りやすくするために使う",w:["文の終わりに必ず使う","段落の最初に使う","名前の後に必ず使う"],cat:"文法",e:"読点（、）は文の意味が分かりにくいときや息継ぎの場所に使います。文の終わりには句点（。）を使います。"},
    {q:"主語・述語の組み合わせで正しいのは",a:"「犬が走る」→犬=主語、走る=述語",w:["「犬が走る」→走る=主語、犬=述語","「犬が走る」→どちらも主語","「犬が走る」→どちらも述語"],cat:"文法",e:"主語は「何が（は）」、述語は「どうする・どんなだ・何だ」にあたる言葉です。"},
    {q:"「ていねい語」の例として正しいのは",a:"「食べます」「行きます」",w:["「食べる」「行く」","「召し上がる」「いらっしゃる」","「食べちゃう」「行っちゃう」"],cat:"文法",e:"丁寧語は「〜です・〜ます」をつける敬語です。尊敬語（相手を高める）・謙譲語（自分を低める）とは異なります。"},
    {q:"「弘法にも筆の誤り」の意味は",a:"どんな名人でも失敗することがある",w:["筆の使い方を間違えた","弘法大師は字が下手だった","筆は正しく使うべき"],cat:"ことわざ",e:"弘法大師（空海）は書道の名人ですが、そんな名人でも筆の誤りがある→「猿も木から落ちる」と同じ意味です。"},
    {q:"「備えあれば憂いなし」の意味は",a:"準備しておけば心配することがない",w:["準備は時間の無駄","心配するから備える","備えても憂いは消えない"],cat:"ことわざ",e:"日頃からしっかり準備しておけば、いざというとき困らないという意味です。防災や勉強にも当てはまります。"},
    {q:"「花より団子」の意味は",a:"見た目より実益・実質を重んじる",w:["花を見ながら団子を食べる","花より団子のほうが高い","花の形の団子が好き"],cat:"ことわざ",e:"花見より団子（食べ物）の方が大事という意味から、見た目・風情より実際の利益・実質を重視することを表します。"},
    {q:"「笑う門には福来たる」の意味は",a:"いつも笑っている家には幸せが訪れる",w:["笑いすぎると不幸になる","門で笑うと幸せになる","笑いを大切にする宗教"],cat:"ことわざ",e:"笑顔が絶えない明るい家庭には自然と幸運や幸せがやってくる、という意味です。"},
    {q:"「目から鱗が落ちる」の意味は",a:"今まで気づかなかったことが急にわかる",w:["目に魚のうろこが入った","目が悪くなった","突然見えなくなった"],cat:"慣用句",e:"目を覆っていた魚のうろこが落ちてよく見えるようになるイメージ→今まで気づかなかったことが急に理解できることです。"},
    {q:"「腕に覚えがある」の意味は",a:"自分の技量に自信がある",w:["腕をけがしたことがある","腕の力がある","腕を鍛えた記憶がある"],cat:"慣用句",e:"自分の腕（技術・実力）に記憶・自信があるという意味で、特定のことに自信を持っていることを表します。"},
    {q:"「目を丸くする」の意味は",a:"驚いて目を大きく開く",w:["目が疲れている","目が丸くなる病気","眼球が球形になる"],cat:"慣用句",e:"驚いたとき目が大きく見開かれて丸くなる様子から、非常に驚いたことを表す慣用句です。"},
    {q:"「耳が痛い」の意味は",a:"自分の弱点・失敗を指摘されて辛い",w:["耳の病気","音がうるさい","耳が聞こえにくい"],cat:"慣用句",e:"自分の欠点や失敗を指摘されて聞くのが辛い、苦しいという気持ちを表します。"},
    {q:"「心が折れる」の意味は",a:"気力がなくなってあきらめる",w:["骨が折れる","心臓が壊れる","心が痛い"],cat:"慣用句",e:"精神的なダメージで気力・やる気が折れてしまうこと。困難な状況でやる気を失うことを表します。"},
    {q:"「副詞」とはどんな言葉か",a:"動詞や形容詞などを修飾する言葉（例：とても）",w:["ものの名前を表す言葉","様子を表す言葉","文をつなぐ言葉"],cat:"文法",e:"副詞は「とても・もっと・ゆっくり」のように動詞や形容詞を詳しく説明する言葉です。"},
    {q:"「接続詞」の例として正しいのは",a:"しかし・だから・そして",w:["赤い・大きい","走る・食べる","犬・学校"],cat:"文法",e:"接続詞は文や文節をつなぐ働きをします。「しかし（逆接）・だから（理由）・そして（順接）」などがあります。"},
    {q:"カタカナで書く言葉として最も適切なのは",a:"外来語（テレビ・コーヒー）",w:["昆虫の名前（むかで・あり）","動物の名前（ねこ・いぬ）","植物の名前（さくら・うめ）"],cat:"文法",e:"外来語（外国から来た言葉）はカタカナで書きます。擬音語（ワンワン）にも使います。"},
    {q:"漢字の部首「さんずい（氵）」に関連する意味は",a:"水に関係する",w:["火に関係する","木に関係する","土に関係する"],cat:"漢字",e:"さんずい（氵）がある漢字：海・川・泳・液・波など、水に関係する漢字に多く使われます。"},
    {q:"漢字の部首「くさかんむり（艹）」に関連する意味は",a:"植物に関係する",w:["動物に関係する","食べ物に関係する","道具に関係する"],cat:"漢字",e:"くさかんむり（艹）がある漢字：花・草・葉・茎・菜など、植物に関係する漢字に多く使われます。"},
    {q:"漢字の部首「にんべん（亻）」に関連する意味は",a:"人に関係する",w:["木に関係する","水に関係する","動物に関係する"],cat:"漢字",e:"にんべん（亻）がある漢字：仕・休・働・仲・使など、人の動作や状態に関係する漢字に多く使われます。"},
    {q:"「比喩」の説明として正しいのは",a:"あるものを別のものにたとえて表現する",w:["同じ言葉を繰り返す","言葉を省略する","古い言葉を使う"],cat:"文法",e:"比喩は「まるで〜のようだ（直喩）」や「〜は〜だ（隠喩）」のように、たとえを使う表現技法です。"},
    {q:"段落の最初の字の書き方は",a:"1文字下げて書く（字下げ）",w:["行の先頭に書く","大文字で書く","記号をつける"],cat:"文法",e:"段落の書き始めは1文字分下げて（字下げ）書くのが日本語の文章の決まりです。"},
    {q:"「体言」とはどんな言葉か",a:"名詞や代名詞など主語になれる言葉",w:["動詞や形容詞","接続詞や感動詞","副詞や助詞"],cat:"文法",e:"体言は主語になれる言葉（名詞・代名詞）のことです。対して動詞・形容詞などを「用言」といいます。"},
    {q:"主語・述語の組み合わせで「猫が走る」の述語は",a:"走る",w:["猫が","猫","が"],cat:"文法",e:"述語は「どうする・どんなだ・何だ」を表す言葉です。「猫が走る」の主語は「猫が」、述語は「走る」です。"},
  ],
  5: [
    {q:"「腕を磨く」の意味は",a:"技術や腕前を鍛え上げる",w:["腕をきれいにする","腕の筋肉をつける","腕がかゆい"],cat:"慣用句",e:"「腕」は技術・実力の意味で使われます。腕を磨く＝技術をより高めるために努力・練習することです。"},
    {q:"「骨を折る」の意味は",a:"苦労して力を尽くす",w:["実際に骨が折れる","楽をする","骨の手術をする"],cat:"慣用句",e:"骨が折れるほど大変な思いをして力を尽くすこと。「骨折り」も同じ意味で使われます。"},
    {q:"「水に流す」の意味は",a:"過去のことをなかったことにする",w:["川に物を捨てる","水で汚れを落とす","川が増水する"],cat:"慣用句",e:"川に流してしまえば元に戻らないことから、過去のいさかいやもめごとをなかったことにするという意味です。"},
    {q:"「目が肥える」の意味は",a:"良いものを見分ける力がある",w:["目が大きい","目が疲れている","視力が高い"],cat:"慣用句",e:"たくさん見てきて目に栄養がついた→本物・良質なものを見分ける審美眼があることを表します。"},
    {q:"「耳を疑う」の意味は",a:"信じられないことを聞いて驚く",w:["耳が聞こえにくい","耳の病気になる","聞き間違いをする"],cat:"慣用句",e:"信じられない話を聞いて、自分の耳が正しいのか疑いたくなるほど驚くことを表します。"},
    {q:"「気が置けない」の意味は",a:"遠慮なく打ち解けられる（親しい）",w:["油断できない","気分が悪い","気が短い"],cat:"慣用句",e:"「気を置く（遠慮する）必要がない」→気心知れた親しい人という意味です。「油断できない」と反対の意味に間違えやすいので注意。"},
    {q:"「情けは人のためならず」の意味は",a:"人に親切にすると自分にも返ってくる",w:["人に親切にしすぎない方がよい","情けをかけるのは無駄だ","親切は自分のためではない"],cat:"ことわざ",e:"「人のためにならない（のでしてはいけない）」という意味に間違えやすい！正しくは「親切は回り回って自分に返ってくる」です。"},
    {q:"「棚からぼたもち」の意味は",a:"思いがけない幸運が舞い込む",w:["努力すれば報われる","ぼたもちは棚に置くもの","棚から物が落ちると危ない"],cat:"ことわざ",e:"棚の上からぼたもちが落ちてきたようなラッキーなことから、努力なしに幸運が手に入ることを表します。"},
    {q:"「能ある鷹は爪を隠す」の意味は",a:"実力のある人は自分の力をひけらかさない",w:["タカは爪を持っていない","能力を隠すのは悪いことだ","鷹は爪が得意"],cat:"ことわざ",e:"本当に強い鷹は爪を見せびらかさないことから、実力のある人ほど謙虚であることを表します。"},
    {q:"「転んでもただでは起きない」の意味は",a:"失敗しても何か利益を得ようとする",w:["転ばないように気をつける","失敗を繰り返す","何もしない"],cat:"ことわざ",e:"転んでもただでは起きず何かを拾うように、失敗してもそこから利益や教訓を得ようとするたくましさを表します。"},
    {q:"「一石二鳥」の意味は",a:"一つのことで二つの利益を得る",w:["一羽の鳥が石を二個持つ","二つのことを同時にする","石と鳥は仲が悪い"],cat:"四字熟語",e:"一つの石で二羽の鳥を同時に射落とすイメージから、一つの行為で二つの利益を得ることを表します。"},
    {q:"「自業自得」の意味は",a:"自分の行いの結果を自分で受ける",w:["自分でやった仕事は自分のもの","他人のせいで苦しむ","得をするために仕事する"],cat:"四字熟語",e:"自分の悪い行いの報い（悪い結果）を自分で受けるという意味で、主に悪い結果に使います。"},
    {q:"「臨機応変」の意味は",a:"その場の状況に合わせて対応する",w:["機械を使って変える","いつも同じ対応をする","変化を嫌う"],cat:"四字熟語",e:"「臨機」はその場に臨む・「応変」は変化に応じるという意味で、状況に応じて柔軟に対応することです。"},
    {q:"「以心伝心」の意味は",a:"言葉がなくてもお互いの気持ちが伝わる",w:["手紙で気持ちを伝える","心が痛む","電話で気持ちを話す"],cat:"四字熟語",e:"心から心へ言葉を使わずに気持ちが伝わること。「テレパシー」に近い感覚を表す四字熟語です。"},
    {q:"「大器晩成」の意味は",a:"優れた人物はゆっくりと大成する",w:["大きな器は遅く作られる","早熟な人が成功する","器が大きいほど価値がある"],cat:"四字熟語",e:"大きな器（＝器の大きな人物）は完成までに時間がかかる→優れた人はじっくり時間をかけて大成するという意味です。"},
    {q:"「喜怒哀楽」の意味は",a:"喜び・怒り・悲しみ・楽しみの感情全般",w:["4種類の色","4つの季節","音楽の4拍子"],cat:"四字熟語",e:"喜（喜び）怒（怒り）哀（悲しみ）楽（楽しみ）の4つで人間の基本的な感情をすべて表しています。"},
    {q:"「試行錯誤」の意味は",a:"試みと失敗を繰り返して解決策を見つける",w:["一度で正解を出す","失敗してあきらめる","他人の方法を真似る"],cat:"四字熟語",e:"いろいろ試してみて失敗しながら、最終的に正しい方法を見つけていく過程を表します。"},
    {q:"「一長一短」の意味は",a:"長所もあれば短所もある",w:["一つのことを長くしたり短くしたりする","長所しかない","短所しかない"],cat:"四字熟語",e:"良い面（長所）も悪い面（短所）も一つずつある→どんなものにも利点と欠点があるという意味です。"},
    {q:"「起死回生」の意味は",a:"絶望的な状況から立て直すこと",w:["死んでから生き返る","元気に生きること","何度も失敗すること"],cat:"四字熟語",e:"死にそうな状況を生き返らせる→絶望的な状況から逆転して立て直すこと。スポーツなどでよく使います。"},
    {q:"「四苦八苦」の意味は",a:"非常に苦労すること",w:["4人で8つの苦しみを分担する","苦しいことが4つある","8人で苦しむ"],cat:"四字熟語",e:"仏教で人間の根本的な苦しみ（四苦＝生老病死）がもとの言葉で、非常に苦労することを表します。"},
    {q:"「石橋を叩いて渡る」の意味は",a:"非常に用心深く行動する",w:["石橋は頑丈だから渡れる","橋を確認してから渡る","叩いて壊してから渡る"],cat:"ことわざ",e:"丈夫な石橋でもたたいて安全を確かめてから渡る→慎重すぎるほど用心深く行動することを表します。"},
    {q:"「豚に真珠」の意味は",a:"価値のわからない者に貴重なものを与えても無駄",w:["豚に真珠のネックレス","豚は宝石が好き","真珠は豚からとれる"],cat:"ことわざ",e:"豚に高価な真珠を与えても価値がわからない→価値のわからない人に貴重なものを与えても意味がないということです。"},
    {q:"「鶴の一声」の意味は",a:"権力ある人の一言で物事が決まる",w:["鶴は大きな声を出す","鶴が鳴くとめでたい","一声で鶴が集まる"],cat:"ことわざ",e:"高貴な鶴の一声（鳴き声）で周りが従うイメージから、権威ある人の一言で議論が決まることを表します。"},
    {q:"「情けは人のためならず」の本当の意味は",a:"人に親切にすると自分にも返ってくる",w:["人に親切にしすぎない方がよい","情けをかけるのは無駄だ","親切は自分のためではない"],cat:"ことわざ",e:"よく「人のためにしてはいけない」と誤解される代表的なことわざです。正しくは「親切は巡り巡って自分に戻る」という意味です。"},
    {q:"「初志貫徹」の意味は",a:"最初の目標や決意を最後まで貫き通す",w:["初めての仕事を成功させる","志を途中で変える","貫くためには力が必要"],cat:"四字熟語",e:"初めに立てた志（目標・決意）を最後まで変えずに貫き通すことです。"},
    {q:"「有名無実」の意味は",a:"名前だけあって実質が伴わない",w:["名前がなくても実力がある","有名になれば実力もつく","実力があれば名前は不要"],cat:"四字熟語",e:"名前（評判）はあるが実際の中身・実力が伴っていないこと。「看板倒れ」と似た意味です。"},
    {q:"「自由自在」の意味は",a:"思いのままに振る舞えること",w:["自分のものにする","自分の家で好きなようにする","ルールのない生活"],cat:"四字熟語",e:"自分の思い通りに、何の制限もなくのびのびと行動できることを表します。"},
    {q:"「以上・以下・未満」で「5以下」に5は含まれるか",a:"含まれる",w:["含まれない","5未満と同じ","状況による"],cat:"文法",e:"「以上・以下」はその数を含みます。「5以上」は5も含む。「未満」はその数を含みません（5未満は4以下）。"},
    {q:"「未満」と「以下」の違いは",a:"未満はその数を含まない・以下はその数を含む",w:["同じ意味","未満は大きい数・以下は小さい数","未満は以下より大きい"],cat:"文法",e:"5未満＝4・3・2・1（5を含まない）、5以下＝5・4・3・2・1（5を含む）。算数でもよく使います。"},
    {q:"「〜れる・〜られる」の用法で「受け身」以外の用法は",a:"可能（〜できる）・尊敬・自発",w:["否定・疑問・感動","受身のみ","仮定・希望"],cat:"文法",e:"「られる」には①受け身②可能（〜できる）③尊敬④自発（自然とそうなる）の4つの用法があります。"},
    {q:"文の組み立てで「修飾語」とは何か",a:"他の言葉を詳しく説明する言葉",w:["文の主語になる言葉","文の結論を表す言葉","接続の役割をする言葉"],cat:"文法",e:"「赤い花」の「赤い」、「速く走る」の「速く」のように、他の言葉を詳しく説明する言葉が修飾語です。"},
    {q:"「倒置」が使われている文の例は",a:"「きれいだね、その花は」",w:["「その花はきれいだね」","「花がきれい」","「花は美しい」"],cat:"文法",e:"倒置は語順を逆にする表現技法です。「その花はきれいだね」を「きれいだね、その花は」と逆にすると印象が強まります。"},
    {q:"「体言止め」を使うと文章の印象はどうなるか",a:"余韻が残り印象的になる",w:["わかりやすくなる","長くなる","堅くなる"],cat:"文法",e:"文末を名詞で終わらせる体言止めは「秋の空。」のように余韻・余情を残し、読者に印象を与えます。"},
    {q:"「先生がおっしゃっている」の「おっしゃる」は何の敬語か",a:"尊敬語",w:["謙譲語","丁寧語","美化語"],cat:"敬語",e:"「おっしゃる」は相手（先生）の行動を高める尊敬語です。自分が言うときは謙譲語「申す」を使います。"},
    {q:"「私が参ります」の「参る」は何の敬語か",a:"謙譲語",w:["尊敬語","丁寧語","美化語"],cat:"敬語",e:"「参る」は自分（話し手）を低めることで相手を立てる謙譲語です。相手の行動には「いらっしゃる」（尊敬語）を使います。"},
    {q:"「先生に手紙をさしあげた」の「さしあげる」は何の敬語か",a:"謙譲語",w:["尊敬語","丁寧語","美化語"],cat:"敬語",e:"「さしあげる」は自分の行動（「あげる」）を謙って表す謙譲語です。相手に「くださる」は尊敬語です。"},
    {q:"「〜です・〜ます」などの語尾を何というか",a:"丁寧語",w:["尊敬語","謙譲語","美化語"],cat:"敬語",e:"丁寧語は「〜です・〜ます・〜ございます」のように話し相手への敬意を示す敬語です。"},
    {q:"「転んでもただでは起きない」の意味は",a:"失敗しても何か利益を得ようとする",w:["転ばないように気をつける","失敗を繰り返す","何もしない"],cat:"ことわざ",e:"転んでもそのまま起きずに何かを拾うように、ピンチをチャンスに変えようとするたくましさを表します。"},
    {q:"読書感想文で「あらすじ」と「感想」の割合として適切なのは",a:"感想を多めに（あらすじは少なく）",w:["あらすじを詳しく書く","半分ずつが良い","あらすじだけ書く"],cat:"文章表現",e:"読書感想文はあらすじより自分の感想・考えを中心に書きます。あらすじは短く、感想や考えを長く書くのがコツです。"},

  6: [
    {q:"「一期一会」の意味は",a:"一生に一度の出会いを大切にする",w:["一年に一度会う","一回だけのチャンス","一つの期間に一つのことをする"],cat:"四字熟語",e:"茶道から生まれた言葉で「この出会いは一生に一度しかない」という心で大切に向き合うことを表します。"},
    {q:"「温故知新」の意味は",a:"過去を学んで新しい知識を得る",w:["古いものより新しいものがよい","温かい気持ちで人と接する","昔話を大切にする"],cat:"四字熟語",e:"「故き（古いもの）を温（たず）ねて新しきを知る」→歴史や過去の経験から新たな発見・知識を得ることです。"},
    {q:"「五里霧中」の意味は",a:"どうしたらよいか見当がつかない状態",w:["霧の中を5里歩く","霧が深くて危ない","遠い場所に霧がある"],cat:"四字熟語",e:"深い霧の中で方向が全くわからない状態から、物事の見通しが立たず途方に暮れることを表します。"},
    {q:"「因果応報」の意味は",a:"よい行いはよい結果、悪い行いは悪い結果をもたらす",w:["原因があれば必ず結果がある","良い行いをしても報われない","悪いことは自然に消える"],cat:"四字熟語",e:"仏教の言葉で「原因（因）があれば必ず結果（果）がある」→善因善果・悪因悪果という意味です。"},
    {q:"「馬耳東風」の意味は",a:"人の意見を聞き流してまったく気にしない",w:["馬は東に向かって走る","耳の聞こえが悪い","風が東から吹く"],cat:"四字熟語",e:"馬は東風（春風）を耳に受けても気にしないことから、忠告や批評をまったく気にしないことを表します。"},
    {q:"「付和雷同」の意味は",a:"自分の考えがなく他人の意見に同調する",w:["雷と雨が一緒に来る","強い意見を持つ","雷のように怒る"],cat:"四字熟語",e:"雷が鳴ると他のものも一緒に響くように、自分の意見を持たずに他人の意見にすぐ賛成することです。"},
    {q:"「七転八倒」の意味は",a:"ひどい苦痛で転げ回ること",w:["7回転んで8回倒れる","転び続けること","七つのことで倒れる"],cat:"四字熟語",e:"七転び八倒れするほど激しい苦痛でのたうち回ること。「四苦八苦」と似た意味で苦しむ様子を表します。"},
    {q:"「虎の威を借る狐」の意味は",a:"権力者の力を借りて威張る小者",w:["虎と狐は仲がよい","狐は虎より強い","強いものに味方する"],cat:"ことわざ",e:"中国の故事で、狐が虎の後ろにつくと他の動物が虎を恐れて逃げることから、権力者の力を利用して威張る人を表します。"},
    {q:"「蛙の子は蛙」の意味は",a:"子は親に似るものだ",w:["カエルは水の中で育つ","子どもは親より優れる","カエルは成長しない"],cat:"ことわざ",e:"カエルの子はカエルにしかならないことから、子どもは結局親に似たものになるという意味です。"},
    {q:"「覆水盆に返らず」の意味は",a:"一度起きたことは元に戻せない",w:["水はいつか蒸発する","こぼした水を集めると役立つ","水は大切にすべきだ"],cat:"ことわざ",e:"盆（容器）からこぼれた水はもとに戻せないことから、一度起きたことは取り返しがつかないという意味です。"},
    {q:"「出る杭は打たれる」の意味は",a:"目立つ人は周囲から攻撃を受けやすい",w:["出てきた杭は叩いて直す","目立つことは良いことだ","杭は出てから打つ"],cat:"ことわざ",e:"地面から飛び出た杭は打ち込まれるように、才能や個性で目立つ人は周囲から妬まれやすいことを表します。"},
    {q:"「食べる」の尊敬語は",a:"召し上がる",w:["いただく","食べられる","食べてやる"],cat:"敬語",e:"相手が「食べる」→尊敬語「召し上がる」。自分が「食べる」→謙譲語「いただく」。混同しやすいので注意。"},
    {q:"「もらう」の謙譲語は",a:"いただく",w:["さしあげる","くださる","おもらいする"],cat:"敬語",e:"自分が「もらう」→謙譲語「いただく」。相手が「くれる」→尊敬語「くださる」。「さしあげる」は「あげる」の謙譲語です。"},
    {q:"「来る」の尊敬語は",a:"いらっしゃる",w:["参る","うかがう","来させる"],cat:"敬語",e:"相手が「来る」→尊敬語「いらっしゃる」。自分が「行く・来る」→謙譲語「参る・うかがう」。"},
    {q:"「言う」の謙譲語は",a:"申す",w:["おっしゃる","話される","言われる"],cat:"敬語",e:"自分が「言う」→謙譲語「申す・申し上げる」。相手が「言う」→尊敬語「おっしゃる」。"},
    {q:"「先生に質問する」を敬語で言うと",a:"先生におたずねする（謙譲語）",w:["先生に話しなさる","先生が質問する","先生にきいてやる"],cat:"敬語",e:"自分の行動（質問する）を低める謙譲語「おたずねする」を使います。「お〜する」は謙譲語の形です。"},
    {q:"「体言止め」とはどんな表現か",a:"文末を名詞（体言）で終わらせる表現",w:["動詞で文末を終わらせる","形容詞で文末を終わらせる","文末を省略する"],cat:"文法",e:"「秋の夕暮れ。」「静かな夜。」のように名詞で文末を終わらせ、余韻と印象を生む表現技法です。"},
    {q:"「受け身（受動態）」の例として正しいのは",a:"「犬に手をかまれた」",w:["「犬が手をかんだ」","「犬と手をつないだ」","「犬のそばに手がある」"],cat:"文法",e:"受け身は「〜に〜される」の形で、動作を受ける側が主語になります。「かまれた」＝かまれる（受け身形）です。"},
    {q:"「倒置法」とはどんな表現か",a:"語順を通常と逆にする表現（強調のため）",w:["同じ言葉を繰り返す表現","句読点をなくす表現","方言を使う表現"],cat:"文法",e:"「きれいだね、その花は」のように語順を逆にして、強調や感情の高まりを表現する技法です。"},
    {q:"「比喩（直喩）」の例として正しいのは",a:"「彼は山のように大きい」",w:["「山が見える」","「山が好きだ」","「山に登った」"],cat:"文法",e:"直喩は「〜のように・〜みたいに」という言葉を使って例えます。「彼は山だ」のように直接たとえると隠喩（暗喩）です。"},
    {q:"「百聞は一見に如かず」の意味は",a:"百回聞くより一度見るほうが確かな理解が得られる",w:["百回見るより一度聞く方が良い","聞くことより見ることが大切","百の知識は一の経験に劣る"],cat:"ことわざ",e:"百回話を聞いても、一度自分の目で見るほど確かな理解は得られないという意味です。体験・実見の大切さを表します。"},
    {q:"「急いては事を仕損じる」の意味は",a:"焦って急ぐと失敗しやすい",w:["急げば成功する","急がなければ失敗する","仕事は急いでする"],cat:"ことわざ",e:"「急がば回れ」と似た意味で、焦って急いで行動すると失敗しやすいという教えです。"},
    {q:"「一を聞いて十を知る」の意味は",a:"少しのことから全体を理解する優れた人",w:["1つのことを10回聞く","10のことを1つにまとめる","10個の知識で1つわかる"],cat:"ことわざ",e:"一つのことを聞いただけで十（全体）を理解できる→理解力や洞察力が非常に優れた人のことを指します。"},
    {q:"「虎の威を借る狐」の意味は",a:"権力者の力を借りて威張る小者",w:["虎と狐は仲がよい","狐は虎より強い","強いものに味方する"],cat:"ことわざ",e:"強い虎の後ろにつくことで威張る弱い狐→権力者の権威を借りて偉そうにふるまう小者を表します。"},
    {q:"「覆水盆に返らず」の意味は",a:"一度起きたことは元に戻せない",w:["水はいつか蒸発する","こぼした水を集めると役立つ","水は大切にすべきだ"],cat:"ことわざ",e:"こぼれた水はもとに戻せないことから、失敗・別れ・終わったことは取り返しがつかないという意味です。"},
    {q:"「異口同音」の意味は",a:"多くの人が口をそろえて同じことを言う",w:["別々の意見を言う","口論をする","異なる言語で話す"],cat:"四字熟語",e:"「異（違う）口（人）が同（同じ）音（言葉）を言う」→多くの人が同じことを言う様子を表します。"},
    {q:"「大同小異」の意味は",a:"大体は同じで少し違いがある",w:["大きな違いがある","全く同じ","全く違う"],cat:"四字熟語",e:"大きいところは同じで、小さい違いはある→ほとんど似たり寄ったりという意味です。"},
    {q:"「危機一髪」の意味は",a:"髪の毛一本ほどの差で危機から逃れる",w:["髪の毛が危険にさらされる","一本の髪の毛で命がつながる","危機が一回ある"],cat:"四字熟語",e:"髪の毛一本の差という非常にわずかな差で危機を免れることを表します。「間一髪」とも言います。"},
    {q:"「馬耳東風」の意味は",a:"人の意見を聞き流してまったく気にしない",w:["馬は東に向かって走る","耳の聞こえが悪い","風が東から吹く"],cat:"四字熟語",e:"馬の耳に春風（東風）が吹いても馬は何も感じないことから、意見や忠告を完全に無視することを表します。"},
    {q:"「先生が来られた」の「来られた」はどんな敬語か",a:"尊敬語",w:["謙譲語","丁寧語","美化語"],cat:"敬語",e:"「来られた」は先生（相手）の行動を高める尊敬語です。「〜られる」は尊敬語にもなります。"},
    {q:"「いただく」は「もらう」の何語か",a:"謙譲語",w:["尊敬語","丁寧語","美化語"],cat:"敬語",e:"自分が「もらう」を低めて言う謙譲語が「いただく」です。「食べる」の謙譲語としても使います。"},
    {q:"「先生がくださった」の「くださる」は何語か",a:"尊敬語",w:["謙譲語","丁寧語","美化語"],cat:"敬語",e:"「くださる」は相手（先生）が「くれる」という動作を高める尊敬語です。自分が「あげる」→「さしあげる」（謙譲語）。"},
    {q:"「先生にお目にかかった」の「お目にかかる」は何語か",a:"謙譲語",w:["尊敬語","丁寧語","美化語"],cat:"敬語",e:"「お目にかかる」は自分（話し手）を低めて「会う」を表す謙譲語です。相手が「会う」→「いらっしゃる」（尊敬語）。"},

    {q:"「換喩（かんゆ）」の例として正しいのは",a:"「ペンは剣より強し」（ペンで文章を表す）",w:["「彼は山のように大きい」","「風が歌っている」","「きれいな花」"],cat:"文法",e:"換喩（メトニミー）は関連するものを使って別のものを表す表現です。ペン＝文章・書物を表しています。"},
    {q:"「省略法」の効果として正しいのは",a:"言い切らないことで読者の想像を促す",w:["内容を詳しく伝える","難しい言葉を使う","比喩で表現する"],cat:"文法",e:"「…」や「〜」を使って言葉を途中で止めることで、読者に余白・想像の余地を与える表現技法です。"},
    {q:"「推敲（すいこう）」の意味は",a:"文章を何度も書き直し磨くこと",w:["文章を暗記すること","文章を速く読むこと","文章を音読すること"],cat:"文章表現",e:"中国の詩人が詩の一語を「推（おす）」にするか「敲（たたく）」にするか悩んだ故事から、文章を練り直すことを表します。"},
    {q:"「体言止め」と「倒置法」の共通点は",a:"どちらも強調・余韻を生む表現技法",w:["どちらも省略する技法","どちらも繰り返す技法","どちらも比喩を使う"],cat:"文法",e:"体言止め（名詞で終わる）・倒置法（語順を逆にする）はどちらも通常の文と変えることで強調・余韻を生む表現技法です。"},
    {q:"「出る杭は打たれる」の意味は",a:"目立つ人は周囲から攻撃を受けやすい",w:["出てきた杭は叩いて直す","目立つことは良いことだ","杭は出てから打つ"],cat:"ことわざ",e:"地面から出た杭は打ち込まれるように、才能や個性で目立つ人は周囲から妬まれたり批判されやすいことを表します。"},
    {q:"「蛙の子は蛙」の意味は",a:"子は親に似るものだ",w:["カエルは水の中で育つ","子どもは親より優れる","カエルは成長しない"],cat:"ことわざ",e:"カエルの子がカエルにしかならないように、子は親に似るものだという意味。「トビは鷹を産まない」とも言います。"},

function makeVisualsUniquePerQuestion() {
  const allGroups = [
    mathData[4], mathData[5], mathData[6],
    scienceData[4], scienceData[5], scienceData[6],
    socialData[4], socialData[5], socialData[6],
    japaneseData[4], japaneseData[5], japaneseData[6],
    englishData[4], englishData[5], englishData[6],
  ];
  const accents = ["#ef4444", "#0ea5e9", "#16a34a", "#f59e0b", "#8b5cf6", "#14b8a6", "#e11d48", "#64748b"];
  const shortText = (text) => String(text || "")
    .replace(/[<>&]/g, "")
    .replace(/[「」『』（）()]/g, "")
    .slice(0, 13);
  const addVariantMark = (svg, question, variantIndex) => {
    const color = accents[variantIndex % accents.length];
    const label = shortText(question.q || question.word || question.cat || "問題");
    const shape = variantIndex % 4;
    const marker = [
      `<circle cx="208" cy="18" r="10" fill="${color}" opacity="0.95"/><text x="208" y="22" font-size="11" fill="#fff" text-anchor="middle" font-family="sans-serif">${variantIndex + 1}</text>`,
      `<rect x="194" y="8" width="28" height="20" rx="4" fill="${color}" opacity="0.95"/><text x="208" y="22" font-size="11" fill="#fff" text-anchor="middle" font-family="sans-serif">${variantIndex + 1}</text>`,
      `<path d="M196 8 L222 18 L196 28 Z" fill="${color}" opacity="0.95"/><text x="205" y="22" font-size="10" fill="#fff" text-anchor="middle" font-family="sans-serif">${variantIndex + 1}</text>`,
      `<polygon points="208,6 222,18 208,30 194,18" fill="${color}" opacity="0.95"/><text x="208" y="22" font-size="10" fill="#fff" text-anchor="middle" font-family="sans-serif">${variantIndex + 1}</text>`,
    ][shape];
    const note = `<g class="unique-visual-note"><rect x="8" y="6" width="132" height="21" rx="4" fill="#ffffff" opacity="0.9" stroke="${color}" stroke-width="1"/><text x="14" y="21" font-size="11" fill="#334155" font-family="sans-serif">${label}</text>${marker}<path d="M24 ${88 + (variantIndex % 3) * 8} C58 ${68 + (variantIndex % 5) * 7}, 98 ${105 - (variantIndex % 4) * 9}, 136 ${76 + (variantIndex % 6) * 6}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.75"/></g>`;
    return svg.replace("</svg>", `${note}</svg>`);
  };
  for (const group of allGroups) {
    if (!Array.isArray(group)) continue;
    const seen = new Map();
    group.forEach((question) => {
      if (!question || !question.svg) return;
      const original = question.svg;
      const count = seen.get(original) || 0;
      if (count > 0) question.svg = addVariantMark(original, question, count);
      seen.set(original, count + 1);
    });
  }
}

function getTargetKanji(word) {
  const kanjiChars = [...word].filter(ch => /[\u4e00-\u9fff]/.test(ch));
  if (!kanjiChars.length) return null;
  let best = kanjiChars[0], bestCount = (visualSimilar[best]||[]).length;
  for (const k of kanjiChars) {
    const c = (visualSimilar[k]||[]).length;
    if (c > bestCount) { best=k; bestCount=c; }
  }
  return best;
}

function generateKanjiChoices(q, pool) {
  const target = getTargetKanji(q.word);
  const sims = target ? (visualSimilar[target]||[]) : [];
  const fakes = [];
  const used = new Set([q.word]);
  for (const sim of shuffle([...sims])) {
    if (sim===target) continue;
    const fake = q.word.replace(target, sim);
    if (!used.has(fake)) { used.add(fake); fakes.push({word:fake,reading:q.reading,hint:q.hint}); }
    if (fakes.length>=3) break;
  }
  if (fakes.length<3) {
    const fb = shuffle(pool.filter(v=>!used.has(v.word)));
    const sl = fb.filter(v=>v.word.length===q.word.length);
    const src = sl.length>=3-fakes.length ? sl : fb;
    for (const v of src) {
      if (fakes.length>=3) break;
      if (!used.has(v.word)) { fakes.push(v); used.add(v.word); }
    }
  }
  return shuffle([q,...fakes.slice(0,3)]);
}

function generateMathChoices(q) {
  return shuffle([{a:q.a,label:q.a}, ...q.w.map(w=>({a:w,label:w}))]);
}

  {id:'japanese',name:'国語',icon:'📝', color:'#334155',
   available:{4:true,5:true,6:true}},
];

// ================================================================
// ===== 画面制御 =====
// ================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function shuffle(arr) {
  const a=[...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function selectGrade(g) {
  currentGrade = g;
  document.getElementById('subject-title').textContent = `${g}年生 — 教科を選ぶ`;
  const grid = document.getElementById('subject-grid');
  grid.innerHTML = SUBJECTS.map(s => {
    const avail = s.available[g];
    return `<button class="subject-btn${avail?'':' disabled'}"
      ${avail?`onclick="selectSubject('${s.id}')"`:''}>
      <span class="icon">${s.icon}</span>
      <span class="label">${s.name}</span>
      <span class="badge">${avail?'':'準備中'}</span>
    </button>`;
  }).join('');
  showScreen('subject-screen');
}

function selectSubject(subjectId) {
  currentSubject = subjectId;
  const s = SUBJECTS.find(x=>x.id===subjectId);
  document.getElementById('start-title').textContent =
    `${currentGrade}年生 ${s.icon} ${s.name}`;

  const opts = document.getElementById('start-options');
  if (subjectId === 'kanji') {
    opts.innerHTML = `
      <div class="section-label">テストの種類</div>
      <div class="mode-grid">
        <button class="mode-btn selected" id="mode-reading" onclick="selectMode('reading')">
          <span class="icon">📖</span>
          <span class="label">読みテスト</span>
          <span class="desc">漢字→ひらがな</span>
        </button>
        <button class="mode-btn" id="mode-writing" onclick="selectMode('writing')">
          <span class="icon">✏️</span>
          <span class="label">書きテスト</span>
          <span class="desc">ひらがな→漢字選択</span>
        </button>
      </div>
      <div class="section-label">問題数</div>
      <div class="count-row" id="count-row"></div>`;
    selectedMode = 'reading';
  } else {
    const cats = getCats(subjectId);
    opts.innerHTML = `
      <div class="section-label">カテゴリ</div>
      <div class="cat-row" id="cat-row">
        <button class="cat-btn selected" onclick="selectCat('all',this)">すべて</button>
        ${cats.map(c=>`<button class="cat-btn" onclick="selectCat('${c}',this)">${c}</button>`).join('')}
      </div>
      <div class="section-label">問題数</div>
      <div class="count-row" id="count-row"></div>`;
    selectedCat = 'all';
  }
  renderCountBtns();
  showScreen('start-screen');
}

function getCats(subjectId) {
  let data;
  if (subjectId==='math')     data=mathData[currentGrade]||[];
  else if (subjectId==='science')  data=scienceData[currentGrade]||[];
  else if (subjectId==='social')   data=socialData[currentGrade]||[];
  else if (subjectId==='english')  data=englishData[currentGrade]||[];
  else if (subjectId==='japanese') data=japaneseData[currentGrade]||[];
  else return [];
  return [...new Set(data.map(q=>q.cat))];
}

function renderCountBtns() {
  const row = document.getElementById('count-row');
  if (!row) return;
  row.innerHTML = [10,20,30,0].map(n=>`
    <button class="count-btn${selectedCount===n?' selected':''}"
      onclick="selectCount(${n},this)">${n===0?'全問':n+'問'}</button>`).join('');
}

function selectMode(mode) {
  selectedMode = mode;
  document.getElementById('mode-reading')?.classList.toggle('selected', mode==='reading');
  document.getElementById('mode-writing')?.classList.toggle('selected', mode==='writing');
}
function selectCount(n, btn) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function selectCat(cat, btn) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ================================================================
// ===== テスト制御 =====
// ================================================================
function getPool() {
  if (currentSubject==='kanji')    return kanjiData[currentGrade]||[];
  if (currentSubject==='math')     return mathData[currentGrade]||[];
  if (currentSubject==='science')  return scienceData[currentGrade]||[];
  if (currentSubject==='social')   return socialData[currentGrade]||[];
  if (currentSubject==='english')  return englishData[currentGrade]||[];
  if (currentSubject==='japanese') return japaneseData[currentGrade]||[];
  return [];
}

function startTest() {
  let pool = getPool();
  if (currentSubject!=='kanji' && selectedCat!=='all')
    pool = pool.filter(q=>q.cat===selectedCat);
  const shuffled = shuffle(pool);
  const count = selectedCount===0 ? shuffled.length : Math.min(selectedCount, shuffled.length);
  questions = shuffled.slice(0, count);
  currentIndex = 0; score = 0; results = [];
  showScreen('quiz-screen');
  showQuestion();
}

function showQuestion() {
  const q = questions[currentIndex];
  answered = false; currentChoices = [];
  document.getElementById('q-counter').textContent = `${currentIndex+1} / ${questions.length}`;
  document.getElementById('q-score').textContent = `正解: ${score}`;
  document.getElementById('progress-fill').style.width = `${currentIndex/questions.length*100}%`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('explanation').textContent = '';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const s = SUBJECTS.find(x=>x.id===currentSubject);
  const badgeClass = currentSubject==='kanji'
    ? (selectedMode==='reading'?'badge-reading':'badge-writing')
    : currentSubject==='math'     ? 'badge-math'
    : currentSubject==='science'  ? 'badge-sci'
    : currentSubject==='social'   ? 'badge-soc'
    : currentSubject==='english'  ? 'badge-eng'
    : 'badge-jpn';
  document.getElementById('q-badge').innerHTML =
    `<span class="badge ${badgeClass}">${s.icon}${s.name}</span>`;

  const area = document.getElementById('question-area');

  if (currentSubject==='kanji' && selectedMode==='reading') {
    // 読みテスト：漢字を見てひらがなを入力
    const hl = q.hint.replace('___',`<span class="hl">${q.word}</span>`);
    area.innerHTML = `
      <div class="q-hint">下線の読み方をひらがなで書きなさい</div>
      <div class="q-text">${hl}</div>
      <input id="answer-input" class="answer-input" type="text"
        placeholder="ひらがなで入力" autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')checkReading()">
      <button class="check-btn" onclick="checkReading()">答え合わせ</button>`;
    setTimeout(()=>document.getElementById('answer-input')?.focus(),50);

  } else if (currentSubject==='kanji' && selectedMode==='writing') {
    // 書きテスト：読みを見て漢字を4択
    const pool = kanjiData[currentGrade]||[];
    currentChoices = generateKanjiChoices(q, pool);
    const blank = q.hint.replace('___','<span class="hl">（　　）</span>');
    area.innerHTML = `
      <div class="q-hint">（　　）に入る漢字を選びなさい</div>
      <div class="q-text">${blank}</div>
      <div class="q-sub">読み：${q.reading}</div>
      <div class="choices">
        ${currentChoices.map((c,i)=>`<button class="choice-btn" id="ch-${i}" onclick="checkWriting(${i})">${c.word}</button>`).join('')}
      </div>`;

  } else {
    // 算数・理科・社会：4択選択
    currentChoices = generateMathChoices(q);
    area.innerHTML = `
      <div class="q-hint">${q.cat || ''}</div>
      ${q.svg ? '<div class="q-figure">' + q.svg + '</div>' : ''}
      <div class="q-text" style="font-size:1.4rem">${q.q}</div>
      <div class="choices">
        ${currentChoices.map((c,i)=>`<button class="choice-btn" id="ch-${i}" onclick="checkChoice(${i})">${c.label}</button>`).join('')}
      </div>`;
  }
}

function checkReading() {
  if (answered) return;
  const input = document.getElementById('answer-input');
  if (!input || !input.value.trim()) return;
  answered = true;
  input.disabled = true;
  const correct = questions[currentIndex].reading;
  const ok = input.value.trim() === correct;
  input.classList.add(ok?'correct':'incorrect');
  showFeedback(ok, correct);
  results.push({...questions[currentIndex], isCorrect:ok, userAnswer:input.value.trim()});
}

function checkWriting(i) {
  if (answered) return;
  answered = true;
  const chosen = currentChoices[i].word;
  const correct = questions[currentIndex].word;
  const ok = chosen === correct;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  currentChoices.forEach((c,idx)=>{
    const b=document.getElementById(`ch-${idx}`);
    if (!b) return;
    if (c.word===correct) b.classList.add('correct');
    else if (idx===i && !ok) b.classList.add('incorrect');
  });
  showFeedback(ok, correct);
  results.push({...questions[currentIndex], isCorrect:ok, userAnswer:chosen});
}

function checkChoice(i) {
  if (answered) return;
  answered = true;
  const chosen = currentChoices[i].a;
  const correct = questions[currentIndex].a;
  const ok = chosen === correct;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  currentChoices.forEach((c,idx)=>{
    const b=document.getElementById(`ch-${idx}`);
    if (!b) return;
    if (c.a===correct) b.classList.add('correct');
    else if (idx===i && !ok) b.classList.add('incorrect');
  });
  showFeedback(ok, correct);
  results.push({...questions[currentIndex], isCorrect:ok, userAnswer:chosen});
}

function showFeedback(ok, correct) {
  if (ok) score++;
  const fb = document.getElementById('feedback');
  fb.textContent = ok ? '✓ 正解！' : `✗ 不正解。正解は「${correct}」`;
  fb.className = 'feedback ' + (ok?'correct':'incorrect');
  document.getElementById('q-score').textContent = `正解: ${score}`;
  document.getElementById('next-btn').style.display = 'block';
  const exp = document.getElementById('explanation');
  const e = questions[currentIndex].e;
  if (e) { exp.textContent = e; exp.style.display = 'block'; }
  else { exp.textContent = ''; exp.style.display = 'none'; }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) showResults();
  else showQuestion();
}

function showResults() {
  showScreen('results-screen');
  const pct = Math.round(score/questions.length*100);
  document.getElementById('res-score').textContent = `${score} / ${questions.length}`;
  document.getElementById('res-pct').textContent = `正答率：${pct}%`;
  const msgs = [[100,'完璧です！満点おめでとう！🎉'],[90,'素晴らしい！あと少しで満点！'],
    [70,'よくできました！さらに頑張ろう！'],[50,'半分以上正解！復習して次は満点を！'],
    [0,'もっと練習しましょう！一緒に頑張ろう！']];
  document.getElementById('res-msg').textContent = (msgs.find(([t])=>pct>=t)||['',''])[1];
  const wrong = results.filter(r=>!r.isCorrect);
  const list = document.getElementById('wrong-list');
  list.innerHTML = wrong.length===0
    ? '<div class="all-correct">全問正解！🎉</div>'
    : wrong.map(r=>`
      <div class="wrong-item">
        <div>
          <div class="w-q">${r.word||r.q||'—'}</div>
          <div class="w-hint">${(r.hint||r.cat||'').replace('___','〔　〕')}</div>
        </div>
        <div>
          <div class="w-ans">正解：${r.reading||r.a}</div>
          <div class="w-mine">あなた：${r.userAnswer}</div>
        </div>
      </div>`).join('');
}

function confirmQuit() {
  document.getElementById('quit-overlay').style.display = 'flex';
}
function closeQuit() {
  document.getElementById('quit-overlay').style.display = 'none';
}
function doQuit() {
  document.getElementById('quit-overlay').style.display = 'none';
  showScreen('grade-screen');
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
