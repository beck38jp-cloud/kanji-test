<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>小学6年生 漢字テスト</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="漢字テスト">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --bg: #f0f9ff;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    }
    #app { width: 100%; max-width: 640px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    h1 { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: var(--muted); }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 28px; }
    .mode-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .btn-mode {
      padding: 20px; border: 2px solid #e2e8f0; border-radius: 12px;
      background: white; cursor: pointer; text-align: center;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-mode .icon { font-size: 2rem; display: block; margin-bottom: 6px; }
    .btn-mode .label { font-size: 1rem; font-weight: 700; display: block; }
    .btn-mode .desc { font-size: 0.8rem; color: var(--muted); display: block; margin-top: 2px; }
    .btn-mode:hover { border-color: var(--primary); }
    .btn-mode.selected { border-color: var(--primary); background: #eff6ff; }
    .btn-mode.selected .label { color: var(--primary); }
    .count-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .count-btn {
      padding: 8px 16px; border: 2px solid #e2e8f0; border-radius: 8px;
      background: white; cursor: pointer; font-weight: 600; font-family: inherit;
      transition: all 0.15s;
    }
    .count-btn.selected { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
    .start-btn {
      width: 100%; padding: 18px; font-size: 1.1rem;
      background: var(--primary); color: white; border: none;
      border-radius: 12px; cursor: pointer; font-weight: 700;
      font-family: inherit; transition: all 0.15s;
    }
    .start-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s; }
    .question-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; font-size: 0.9rem; color: var(--muted);
    }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 600;
    }
    .badge-reading { background: #dbeafe; color: #1d4ed8; }
    .badge-writing { background: #dcfce7; color: #166534; }
    .question-text { font-size: 1.9rem; text-align: center; margin: 20px 0; line-height: 1.7; }
    .kanji-hl { color: var(--primary); font-weight: 700; border-bottom: 3px solid var(--primary); }
    .hint-text { text-align: center; color: var(--muted); margin-bottom: 12px; font-size: 0.9rem; }
    .reading-display { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 16px; color: #475569; }
    .answer-input {
      width: 100%; padding: 14px; font-size: 16px;
      border: 2px solid #e2e8f0; border-radius: 10px; text-align: center;
      outline: none; transition: border-color 0.2s; font-family: inherit;
      margin-bottom: 12px;
    }
    .answer-input:focus { border-color: var(--primary); }
    .answer-input.correct { border-color: var(--success); background: #f0fdf4; }
    .answer-input.incorrect { border-color: var(--error); background: #fef2f2; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .choice-btn {
      padding: 18px 10px; font-size: 1.6rem;
      border: 2px solid #e2e8f0; border-radius: 10px; background: white;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--primary); background: #eff6ff; transform: translateY(-1px); }
    .choice-btn.correct { border-color: var(--success) !important; background: #f0fdf4 !important; }
    .choice-btn.incorrect { border-color: var(--error) !important; background: #fef2f2 !important; }
    .choice-btn:disabled { cursor: default; transform: none; }
    .feedback { text-align: center; font-size: 1.1rem; font-weight: 600; margin: 14px 0; min-height: 28px; }
    .feedback.correct { color: var(--success); }
    .feedback.incorrect { color: var(--error); }
    .next-btn {
      width: 100%; padding: 14px; font-size: 1rem;
      background: #475569; color: white; border: none;
      border-radius: 10px; cursor: pointer; font-weight: 600;
      font-family: inherit; display: none; margin-top: 4px;
    }
    .next-btn:hover { background: #334155; }
    .score-big { font-size: 3.5rem; font-weight: 700; text-align: center; color: var(--primary); margin: 20px 0 4px; }
    .score-pct { text-align: center; color: var(--muted); margin-bottom: 4px; }
    .score-msg { text-align: center; font-weight: 600; font-size: 1.1rem; margin-bottom: 28px; }
    .wrong-list-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
    .wrong-list { max-height: 320px; overflow-y: auto; }
    .wrong-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 4px; border-bottom: 1px solid #f8fafc; gap: 8px;
    }
    .wrong-item .w-word { font-size: 1.1rem; font-weight: 700; min-width: 80px; }
    .wrong-item .w-hint { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .wrong-item .w-ans { text-align: right; font-size: 0.85rem; color: #059669; }
    .wrong-item .w-mine { color: var(--error); font-size: 0.8rem; }
    .all-correct { text-align: center; color: var(--success); padding: 20px; font-size: 1.1rem; font-weight: 600; }
    .answer-check-btn {
      width: 100%; padding: 14px; font-size: 1rem;
      background: var(--primary); color: white; border: none;
      border-radius: 10px; cursor: pointer; font-weight: 600; font-family: inherit;
    }
    .answer-check-btn:hover { background: var(--primary-dark); }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== START SCREEN ===== -->
  <div id="start-screen" class="screen active">
    <div class="card">
      <h1>小学6年生<br>漢字テスト</h1>
      <p class="subtitle">191字の漢字を確認しよう！</p>

      <h2>テストの種類を選ぶ</h2>
      <div class="mode-buttons">
        <button class="btn-mode selected" id="mode-btn-reading" onclick="selectMode('reading')">
          <span class="icon">📖</span>
          <span class="label">読みテスト</span>
          <span class="desc">漢字 → ひらがな</span>
        </button>
        <button class="btn-mode" id="mode-btn-writing" onclick="selectMode('writing')">
          <span class="icon">✏️</span>
          <span class="label">書きテスト</span>
          <span class="desc">ひらがな → 漢字選択</span>
        </button>
      </div>

      <h2>問題数を選ぶ</h2>
      <div class="count-selector">
        <button class="count-btn" onclick="selectCount(10)">10問</button>
        <button class="count-btn selected" onclick="selectCount(20)">20問</button>
        <button class="count-btn" onclick="selectCount(30)">30問</button>
        <button class="count-btn" onclick="selectCount(50)">50問</button>
        <button class="count-btn" onclick="selectCount(0)">全問</button>
      </div>

      <button class="start-btn" onclick="startTest()">テスト開始 →</button>
    </div>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="quiz-screen" class="screen">
    <div class="card">
      <div class="question-meta">
        <span id="q-counter">1 / 20</span>
        <span id="q-score">正解: 0</span>
        <span id="q-badge"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div id="question-area"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
    </div>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div id="results-screen" class="screen">
    <div class="card">
      <h1>テスト結果</h1>
      <div class="score-big" id="res-score"></div>
      <div class="score-pct" id="res-pct"></div>
      <div class="score-msg" id="res-msg"></div>
      <div class="wrong-list-title">間違えた問題</div>
      <div class="wrong-list" id="wrong-list"></div>
      <button class="start-btn" style="margin-top:24px;" onclick="backToStart()">もう一度チャレンジ</button>
    </div>
  </div>

</div>

// 単語の「テスト対象漢字」を返す：視覚類似が多い漢字を優先
function getTargetKanji(word) {
  const kanjiChars = [...word].filter(ch => /[\u4e00-\u9fff]/.test(ch));
  if (kanjiChars.length === 0) return null;
  let best = kanjiChars[0];
  let bestCount = (visualSimilar[best] || []).length;
  for (const k of kanjiChars) {
    const count = (visualSimilar[k] || []).length;
    if (count > bestCount) { best = k; bestCount = count; }
  }
  return best;
}

// 正解の漢字1文字だけを似た字に差し替えた「偽の選択肢」を生成
function generateSimilarChoices(q) {
  const target = getTargetKanji(q.word);
  const sims = target ? (visualSimilar[target] || []) : [];

  const fakes = [];
  const usedWords = new Set([q.word]);
  for (const sim of shuffle([...sims])) {
    if (sim === target) continue;
    const fakeWord = q.word.replace(target, sim);
    if (!usedWords.has(fakeWord)) {
      usedWords.add(fakeWord);
      fakes.push({ word: fakeWord, reading: q.reading, hint: q.hint });
    }
    if (fakes.length >= 3) break;
  }

  // 足りなければ同じ文字数の別語彙で補う（フォールバック）
  if (fakes.length < 3) {
    const pool = shuffle(vocabUniq.filter(v => !usedWords.has(v.word)));
    const sameLen = pool.filter(v => v.word.length === q.word.length);
    const fallback = sameLen.length >= 3 - fakes.length ? sameLen : pool;
    for (const v of fallback) {
      if (fakes.length >= 3) break;
      if (!usedWords.has(v.word)) { fakes.push(v); usedWords.add(v.word); }
    }
  }

  return shuffle([q, ...fakes.slice(0, 3)]);
}

// ===== App State =====
let selectedMode = 'reading';
let selectedCount = 20;
let questions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let results = [];
let currentChoices = [];

// ===== Helpers =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectMode(mode) {
  selectedMode = mode;
  document.getElementById('mode-btn-reading').classList.toggle('selected', mode === 'reading');
  document.getElementById('mode-btn-writing').classList.toggle('selected', mode === 'writing');
}

function selectCount(count) {
  selectedCount = count;
  document.querySelectorAll('.count-btn').forEach(btn => {
    const n = btn.textContent === '全問' ? 0 : parseInt(btn.textContent);
    btn.classList.toggle('selected', n === count);
  });
}

// ===== Test Logic =====
function startTest() {
  const shuffled = shuffle(vocabUniq);
  const count = selectedCount === 0 ? shuffled.length : Math.min(selectedCount, shuffled.length);
  questions = shuffled.slice(0, count);
  currentIndex = 0;
  score = 0;
  results = [];
  showScreen('quiz-screen');
  showQuestion();
}

function showQuestion() {
  const q = questions[currentIndex];
  answered = false;
  currentChoices = [];

  document.getElementById('q-counter').textContent = `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('q-score').textContent = `正解: ${score}`;
  document.getElementById('progress-fill').style.width = `${(currentIndex / questions.length) * 100}%`;
  document.getElementById('q-badge').innerHTML =
    selectedMode === 'reading'
      ? '<span class="badge badge-reading">読みテスト</span>'
      : '<span class="badge badge-writing">書きテスト</span>';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  const area = document.getElementById('question-area');

  if (selectedMode === 'reading') {
    // Show kanji word highlighted, user types hiragana
    const hintWithHL = q.hint.replace('___', `<span class="kanji-hl">${q.word}</span>`);
    area.innerHTML = `
      <div class="hint-text">下線の漢字の読み方をひらがなで書きなさい</div>
      <div class="question-text">${hintWithHL}</div>
      <input type="text" id="answer-input" class="answer-input"
        placeholder="ひらがなで入力"
        autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')checkReadingAnswer()">
      <button class="answer-check-btn" onclick="checkReadingAnswer()">答え合わせ</button>
    `;
    setTimeout(() => document.getElementById('answer-input')?.focus(), 50);
  } else {
    // Show hiragana reading + context, user selects correct kanji from 4 choices
    currentChoices = generateSimilarChoices(q);

    const hintWithBlank = q.hint.replace('___', '<span class="kanji-hl">（　　）</span>');
    area.innerHTML = `
      <div class="hint-text">（　　）に入る正しい漢字を選びなさい</div>
      <div class="question-text">${hintWithBlank}</div>
      <div class="reading-display">読み：${q.reading}</div>
      <div class="choices">
        ${currentChoices.map((c, i) => `
          <button class="choice-btn" id="choice-${i}" onclick="checkWritingAnswer(${i})">
            ${c.word}
          </button>
        `).join('')}
      </div>
    `;
  }
}

function checkReadingAnswer() {
  if (answered) return;
  const input = document.getElementById('answer-input');
  if (!input) return;
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  answered = true;
  input.disabled = true;

  const correct = questions[currentIndex].reading;
  const isCorrect = userAnswer === correct;

  input.classList.add(isCorrect ? 'correct' : 'incorrect');

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.textContent = '✓ 正解！';
    fb.className = 'feedback correct';
    score++;
  } else {
    fb.textContent = `✗ 不正解。正解は「${correct}」`;
    fb.className = 'feedback incorrect';
  }

  results.push({ ...questions[currentIndex], isCorrect, userAnswer });
  document.getElementById('q-score').textContent = `正解: ${score}`;
  document.getElementById('next-btn').style.display = 'block';
}

function checkWritingAnswer(choiceIdx) {
  if (answered) return;
  answered = true;

  const chosen = currentChoices[choiceIdx].word;
  const correct = questions[currentIndex].word;
  const isCorrect = chosen === correct;

  document.querySelectorAll('.choice-btn').forEach(btn => { btn.disabled = true; });
  currentChoices.forEach((c, i) => {
    const btn = document.getElementById(`choice-${i}`);
    if (!btn) return;
    if (c.word === correct) btn.classList.add('correct');
    else if (i === choiceIdx && !isCorrect) btn.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.textContent = '✓ 正解！';
    fb.className = 'feedback correct';
    score++;
  } else {
    fb.textContent = `✗ 不正解。正解は「${correct}」（${questions[currentIndex].reading}）`;
    fb.className = 'feedback incorrect';
  }

  results.push({ ...questions[currentIndex], isCorrect, userAnswer: chosen });
  document.getElementById('q-score').textContent = `正解: ${score}`;
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  showScreen('results-screen');

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('res-score').textContent = `${score} / ${questions.length}`;
  document.getElementById('res-pct').textContent = `正答率：${pct}%`;

  let msg = '';
  if (pct === 100) msg = '完璧です！満点おめでとう！🎉';
  else if (pct >= 90) msg = '素晴らしい！あと少しで満点！';
  else if (pct >= 70) msg = 'よくできました！さらに頑張ろう！';
  else if (pct >= 50) msg = '半分以上正解！復習して次は満点をめざそう！';
  else msg = 'もっと練習しましょう！一緒に頑張ろう！';
  document.getElementById('res-msg').textContent = msg;

  const wrong = results.filter(r => !r.isCorrect);
  const list = document.getElementById('wrong-list');
  if (wrong.length === 0) {
    list.innerHTML = '<div class="all-correct">全問正解！🎉 完璧です！</div>';
  } else {
    list.innerHTML = wrong.map(r => `
      <div class="wrong-item">
        <div>
          <div class="w-word">${r.word}</div>
          <div class="w-hint">${r.hint.replace('___', '〔　〕')}</div>
        </div>
        <div>
          <div class="w-ans">正解：${r.reading}</div>
          ${r.userAnswer ? `<div class="w-mine">入力：${r.userAnswer}</div>` : ''}
        </div>
      </div>
    `).join('');
  }
}

function backToStart() {
  showScreen('start-screen');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
